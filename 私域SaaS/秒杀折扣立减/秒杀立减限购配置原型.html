---

## 1. 业务背景

### 1.1 需求描述

当前「秒杀活动」「折扣立减」已有活动创建、商品设置、活动商品管理能力，但限购配置不完整，无法分别控制：

- 活动维度：活动总可售数量、单用户在活动内可购买数量。
- 商品维度：单商品在活动内总可售数量、单用户在活动内对单商品可购买数量。

运营配置活动时，只能配置活动价、立减金额、折扣等价格信息，缺少总量和用户维度的购买约束，容易出现活动库存被快速消耗、单用户超量购买、商品活动量与商品规格库存不匹配等问题。

### 1.3 目标结果

- 秒杀活动支持活动维度和商品维度限购配置。
- 折扣立减在保留原有「立减 / 打折」活动类型、价格配置和活动商品管理能力的基础上，补充活动维度和商品维度限购配置。
- 创建活动保存后返回列表，运营可从列表进入「活动商品」继续维护商品活动数量、商品用户限购，并支持批量设置。
- 所有限购字段为空时表示不限购；填写时统一校验正整数，避免无效配置进入活动链路。

### 1.4 本期范围

- 菜单范围：仅涉及「营销中心 / 秒杀活动」「营销中心 / 折扣立减」。
- 秒杀活动列表、新建、编辑、活动商品管理。
- 折扣立减列表、新建、编辑、活动商品管理。
- 秒杀活动新增活动维度限购字段：
  - 活动总数量。
  - 活动用户限购。
- 秒杀活动商品设置和活动商品管理新增商品维度限购字段：
  - 商品活动数量。
  - 商品用户限购。
- 折扣立减新增活动维度和商品维度限购字段，规则与秒杀活动一致。
- 商品设置和活动商品管理均支持批量设置商品活动数量、商品用户限购。

### 1.5 本期不做

- 不调整前台活动页面视觉样式。
- 不调整订单支付、退款、售后链路的页面展示，仅要求下单校验接入本次限购规则。

---

## 2. 关键业务规则

### 4.1 唯一性 / 并发性

- 活动购买扣减需按服务端库存和限购规则做原子校验，避免并发下超卖或突破用户限购。
- 当多个用户同时购买同一活动商品时，需同时校验：
  - 活动剩余总数量。
  - 用户活动剩余可购数量。
  - 商品活动剩余数量。
  - 用户商品剩余可购数量。
- 任一维度不满足时，本次下单不得成功。

### 4.2 字段定义

- 活动总数量：当前活动下所有商品总计可售数量。
  - 是否必填：否。
  - 默认值：空。
  - 范围 / 长度：正整数。
  - 不允许：0、负数、小数、非数字。
  - 为空含义：不限购。

- 活动用户限购：单个用户在当前活动内累计可购买数量。
  - 是否必填：否。
  - 默认值：空。
  - 范围 / 长度：正整数。
  - 不允许：0、负数、小数、非数字。
  - 为空含义：不限购。

- 商品活动数量：单个商品在当前活动内总计可售数量。
  - 是否必填：否。
  - 默认值：空。
  - 范围 / 长度：正整数。
  - 不允许：0、负数、小数、非数字、大于商品规格数量。
  - 为空含义：不限购。

- 商品用户限购：单个用户在当前活动内对单个商品可购买数量。
  - 是否必填：否。
  - 默认值：空。
  - 范围 / 长度：正整数。
  - 不允许：0、负数、小数、非数字、大于商品活动数量。
  - 为空含义：不限购。

### 4.3 计算规则

- 活动总数量校验：
  - 若活动总数量为空，不限制活动整体售卖数量。
  - 若活动总数量不为空，活动内所有商品累计成交数量不得超过活动总数量。

- 活动用户限购校验：
  - 若活动用户限购为空，不限制用户在活动内累计购买数量。
  - 若活动用户限购不为空，同一用户在该活动内历史已购数量 + 本次购买数量不得超过活动用户限购。
  - 活动总数量和活动用户限购均填写时，活动用户限购不得大于活动总数量。

- 商品活动数量校验：
  - 若商品活动数量为空，不限制该商品活动总售卖数量。
  - 若商品活动数量不为空，该商品在当前活动内累计成交数量不得超过商品活动数量。
  - 商品活动数量不得大于商品规格数量。

- 商品用户限购校验：
  - 若商品用户限购为空，不限制用户在该活动内对该商品的购买数量。
  - 若商品用户限购不为空，同一用户在该活动内对该商品历史已购数量 + 本次购买数量不得超过商品用户限购。
  - 商品活动数量和商品用户限购均填写时，商品用户限购不得大于商品活动数量。

### 4.4 关键联动逻辑

- 秒杀活动新建 / 编辑：
  - 商品设置展示秒杀价、商品活动数量、商品用户限购、排序值、售价、商品名称、属性、规格数量、操作。
- 折扣立减新建 / 编辑：
  - 选择立减时，商品设置展示立减金额、减后价格、商品活动数量、商品用户限购。
  - 选择打折时，商品设置展示折扣、折后价格、商品活动数量、商品用户限购。
- 商品设置批量设置：
  - 秒杀活动支持批量设置秒杀价、商品活动数量、商品用户限购。
  - 折扣立减立减模式支持批量设置立减金额、商品活动数量、商品用户限购。
  - 折扣立减打折模式支持批量设置折扣、商品活动数量、商品用户限购。
  - 批量输入为空时，不覆盖商品原字段值。
- 活动商品管理页可继续编辑商品活动数量、商品用户限购，并支持批量设置。

### 4.5 异常处理规则

- 活动总数量格式错误：提示「活动总数量必须为正整数」。
- 活动用户限购格式错误：提示「活动用户限购必须为正整数」。
- 活动用户限购大于活动总数量：提示「活动用户限购不能大于活动总数量」。
- 商品活动数量格式错误：提示「商品活动数量必须为正整数」。
- 商品用户限购格式错误：提示「商品用户限购必须为正整数」。
- 商品活动数量大于规格数量：提示「商品活动数量不能大于规格数量」。
- 商品用户限购大于商品活动数量：提示「商品用户限购不能大于商品活动数量」。

### 4.6 上限与极限（按需）

- 活动总数量、活动用户限购、商品活动数量、商品用户限购最大值建议不超过 99999999。
- 单个活动可添加商品数量上限沿用现有秒杀 / 折扣立减规则。
- 批量设置仅作用于当前活动商品列表中已添加的商品。
- 已成交订单不因后续调小限购数量而回滚；新订单按最新配置校验。

t',this.value)">`)}</div></section><section class="section" id="users"><div class="sec-title">参与用户</div><div class="card">${row('参与用户','req',`<label class="radio on"><i></i>全部用户</label><label class="radio"><i></i>指定人群</label><label class="radio"><i></i>指定标签</label><label class="radio"><i></i>新客</label><label class="radio"><i></i>指定用户</label>`)}</div></section><section class="section" id="goods"><div class="sec-title">商品设置</div><div class="card">${goodsEditor('form')}</div></section><section class="section" id="share"><div class="sec-title">推广分享</div><div class="card">${shareHtml}</div></section></div><nav class="anchor"><a class="active" href="#base">基础信息</a><a href="#users">参与用户</a><a href="#goods">商品设置</a><a href="#share">推广分享</a></nav></div>`;

function row(label,cls,html){return `<div class="form-row"><div class="label ${cls}">${label}</div><div class="control">${html}</div></div>`}
function goodsEditor(mode){
const activity=mode==='form'?state.form:db.activities.find(a=>a.id===state.manageId);
const list=activity.products;
const isDiscount=activity.type==='折扣立减';
const isFold=isDiscount&&activityMode(activity)==='打折';
const promoLabel=isDiscount?(isFold?'折扣':'立减金额'):'秒杀价';
const promoUnit=isDiscount?(isFold?'折':'(元)'):'(元)';
const afterLabel=isDiscount?(isFold?'折后价格':'减后价格'):'';
const afterHead=isDiscount?`<th style="width:10%">${afterLabel}</th>`:'';
return `<div class="batch">${mode==='form'?'<b>批量设置：</b>':''}<span>${promoLabel}</span><input class="input" id="${mode}BatchPrice" placeholder="${isFold?'请输入折扣':'请输入金额'}"><span>${promoUnit}</span><span>商品活动数量</span><input class="input" id="${mode}BatchProductLimit" placeholder="请输入数量"><span>商品用户限购</span><input class="input" id="${mode}BatchUserLimit" placeholder="请输入数量"><button class="btn-sm" onclick="applyBatch('${mode}')">批量设置</button><span style="margin-left:auto"></span><button class="link" onclick="addProduct('${mode}')">＋ 添加商品</button></div><div class="table-card"><table><thead><tr><th style="width:12%">${isDiscount?'* ':''}${promoLabel}${isFold?'':'（元）'}</th>${afterHead}<th style="width:12%">商品活动数量</th><th style="width:12%">商品用户限购</th><th style="width:9%">排序值</th><th style="width:9%">售价</th><th style="width:24%">商品名称</th><th style="width:9%">商品规格</th><th style="width:8%">规格数量</th><th style="width:70px">操作</th></tr></thead><tbody>${list.map((p,i)=>productRow(p,i,mode,activity)).join('')||`<tr><td colspan="${isDiscount?10:9}" class="empty">暂无活动商品，请点击添加商品</td></tr>`}</tbody></table></div>`;
}
function productRow(p,i,mode,activity){
const isDiscount=activity.type==='折扣立减';
const afterCell=isDiscount?`<td>${promoAfterPrice(p,activity)}</td>`:'';
const placeholder=isDiscount&&activityMode(activity)==='打折'?'请输入折扣':'不大于最低售价';
return `<tr><td><input class="mini-input" placeholder="${placeholder}" value="${p.activityPrice}" oninput="setProduct('${mode}',${i},'activityPrice',this.value);render()"></td>${afterCell}<td><input class="mini-input" placeholder="不填写不限购" value="${p.productLimit}" oninput="setProduct('${mode}',${i},'productLimit',this.value)"></td><td><input class="mini-input" placeholder="不填写不限购" value="${p.userProductLimit}" oninput="setProduct('${mode}',${i},'userProductLimit',this.value)"></td><td><input class="mini-input" value="${p.sort}" oninput="setProduct('${mode}',${i},'sort',this.value)"></td><td>¥${p.price}</td><td><div class="product"><div class="pic">货</div><div><span class="tag run">普通</span> ${p.name}<div class="sub">ID：${p.id}</div></div></div></td><td>${p.attr}</td><td>${p.stock}</td><td><button class="link danger" onclick="removeProduct('${mode}',${i})">删除</button></td></tr>`;
}
function promoAfterPrice(p,activity){const price=Number(p.price)||0,v=Number(p.activityPrice);if(!v)return '-';if(activityMode(activity)==='打折')return '¥'+(price*v/10).toFixed(2);return '¥'+Math.max(price-v,0).toFixed(2)}
function getList(mode){return mode==='form'?state.form.products:db.activities.find(a=>a.id===state.manageId).products}
function setProduct(mode,i,k,v){getList(mode)[i][k]=v;if(mode==='manage')saveData()}
function addProduct(mode){getList(mode).push(product(Date.now()%1000,'新增活动商品 '+(getList(mode).length+1),88,10,'默认','', '', '', '0'));if(mode==='manage')saveData();render()}
function removeProduct(mode,i){getList(mode).splice(i,1);if(mode==='manage')saveData();render()}
function applyBatch(mode){const price=qs(mode+'BatchPrice').value, pl=qs(mode+'BatchProductLimit').value, ul=qs(mode+'BatchUserLimit').value;if(!validateOptionalInt(pl,'商品活动数量')||!validateOptionalInt(ul,'商品用户限购'))return;getList(mode).forEach(p=>{if(price!=='')p.activityPrice=price;if(pl!=='')p.productLimit=pl;if(ul!=='')p.userProductLimit=ul});if(mode==='manage')saveData();toast('批量设置成功','info');render()}
function saveForm(){const f=state.form;if(!f.name.trim())return toast('请输入活动名称','error');if(!f.tag.trim())return toast('请输入活动标签','error');if(!f.long&&(!f.start||!f.end))return toast('请选择活动时间','error');if(!validateOptionalInt(f.totalLimit,'活动总数量')||!validateOptionalInt(f.userActivityLimit,'活动用户限购'))return;if(f.totalLimit&&f.userActivityLimit&&Number(f.userActivityLimit)>Number(f.totalLimit))return toast('活动用户限购不能大于活动总数量','error');for(const p of f.products){if(!validateProduct(p))return}if(state.editing){const idx=db.activities.findIndex(a=>a.id===state.editing);f.updated=now();f.updater='运营管理员';db.activities[idx]=f}else{f.id=String(Date.now()).slice(-6);f.created=f.updated=now();db.activities.unshift(f)}saveData();state.selectedId=f.id;toast('保存成功','info');goList()}
function validateOptionalInt(v,label){if(v===''||v===undefined||v===null)return true;if(!/^[1-9]\d*$/.test(String(v)))return toast(label+'必须为正整数','error'),false;return true}
function validateProduct(p){if(!validateOptionalInt(p.productLimit,'商品活动数量')||!validateOptionalInt(p.userProductLimit,'商品用户限购'))return false;if(p.productLimit&&Number(p.productLimit)>Number(p.stock))return toast('商品活动数量不能大于规格数量','error'),false;if(p.productLimit&&p.userProductLimit&&Number(p.userProductLimit)>Number(p.productLimit))return toast('商品用户限购不能大于商品活动数量','error'),false;return true}
function openManage(id){state.page='manage';state.manageId=id;state.selectedId=id;render()}
function renderManage(){const a=db.activities.find(x=>x.id===state.manageId);qs('app').innerHTML=`<div class="page-bar"><div class="back" onclick="goList()">‹ ${a.name}</div><div class="bar-actions"><button class="link" onclick="goList()">取消</button><button class="btn-primary" onclick="saveManage()">保存</button></div></div><div class="toolbar"><div class="filters"><label class="field">商品ID：<input class="input" placeholder="请输入商品ID"></label><label class="field">商品名称：<input class="input" placeholder="请输入商品名称"></label><button class="search-btn">⌕</button></div></div>${goodsEditor('manage')}` }
function saveManage(){const a=db.activities.find(x=>x.id===state.manageId);for(const p of a.products){if(!validateProduct(p))return}a.updated=now();a.updater='运营管理员';saveData();toast('保存成功','info');goList()}

function copyAct(id){const r=JSON.parse(JSON.stringify(db.activities.find(a=>a.id===id)));r.id=String(Date.now()).slice(-6);r.name=r.name+'-复制';r.status='待开始';r.created=r.updated=now();db.activities.unshift(r);saveData();toast('复制成功','info');renderList()}
function askDelete(id){state.confirm=()=>{db.activities=db.activities.filter(a=>a.id!==id);saveData();closeConfirm();toast('删除成功','info');renderList()};qs('confirmTitle').textContent='删除';qs('confirmDesc').textContent='是否确认删除';qs('confirmOv').style.display='flex'}
function askEnd(id){state.confirm=()=>{const r=db.activities.find(a=>a.id===id);r.status='已结束';r.updated=now();saveData();closeConfirm();toast('已立即结束','info');renderList()};qs('confirmTitle').textContent='立即结束';qs('confirmDesc').textContent='是否立即结束，结束后用户将不可领取';qs('confirmOv').style.display='flex'}
function closeConfirm(){qs('confirmOv').style.display='none';state.confirm=null}
function runConfirm(){if(state.confirm)state.confirm()}
function showMore(e){const m=e.currentTarget.querySelector('.more-menu');m.classList.add('show');const r=e.currentTarget.getBoundingClientRect();m.style.top=(r.bottom+2)+'px';m.style.left=(r.right-108)+'px'}
function hideMore(e){setTimeout(()=>e.currentTarget.querySelector('.more-menu').classList.remove('show'),80)}
function toast(msg,type='info'){const el=document.createElement('div');el.className='toast '+(type==='error'?'error':'');el.textContent=(type==='error'?'✕ ':'ℹ ')+msg;qs('toasts').appendChild(el);setTimeout(()=>el.remove(),type==='error'?5000:2000)}
function now(){const d=new Date();const p=n=>String(n).padStart(2,'0');return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())} ${p(d.getHours())}:${p(d.getMinutes())}:${p(d.getSeconds())}`}
function toLocal(s){return s?String(s).replace(' ','T').slice(0,16):''}function fromLocal(s){return s?String(s).replace('T',' ')+':00':''}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeConfirm()});
qs('confirmOv').addEventListener('click',e=>{if(e.target.id==='confirmOv')closeConfirm()});
initLogic();render();
</script>
</body>
</html>
