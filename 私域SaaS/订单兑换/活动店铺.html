        {name:'禁用产品组',ids:['PDD-OFF-001'],status:'禁用',threshold:'',points:''}

    ];
    const publicStores = loadPublicStores();
    const currentActivity = findActivity();
    let dimension = currentActivity?.exchangeDimension === '店铺产品组维度' || params.get('dimension') === 'group' ? 'group' : 'store';
    let savedStores = loadSavedStores();
    let draftStores = JSON.parse(JSON.stringify(savedStores));
    let deleteTarget = null;

    function loadActivities(){
      try{return JSON.parse(localStorage.getItem(activityStorageKey)||'[]')}catch(e){return []}
    }
    function findActivity(){
      const list=loadActivities();
      return list.find(item=>item.id===activityId)||list.find(item=>item.name===activity)||null;
    }
    function loadSavedStores(){
      const stores=currentActivity?.stores;
      if(Array.isArray(stores)&&stores.length)return JSON.parse(JSON.stringify(stores));
      return [
        {...publicStores[0],time:'2026-04-17 10:20:33',threshold:'99',points:'30',productGroups:JSON.parse(JSON.stringify(publicStores[0].productGroups||[]))},
        {...publicStores[1],time:'2026-04-17 10:18:20',threshold:'299',points:'100',productGroups:JSON.parse(JSON.stringify(publicStores[1].productGroups||[]))}
      ];
    }
    function loadPublicStores(){
      try{
        const local = JSON.parse(localStorage.getItem('yo_public_stores_v2') || '[]');
        if(local.length) return local.map(store => ({...store,productGroups:store.productGroups||[]}));
      }catch(e){}
      return defaultStores;
    }
    function toggleLogic(){
      const p=document.getElementById('logicPanel');
      const b=p.querySelector('.logic-toggle');
      p.classList.toggle('expanded');
      b.textContent=p.classList.contains('expanded')?'收起逻辑':'展开逻辑';
    }
    function setDirty(flag=true){document.getElementById('dirtyTip').style.display=flag?'inline':'none'}
    function getMeta(){return {action:'订单满',unit:'元',thresholdPlaceholder:'请输入订单金额'}}
    function switchDimension(next,el){
      dimension=next;
      el.parentElement.querySelectorAll('.radio-pill').forEach(item=>item.classList.remove('active'));
      el.classList.add('active');
      if(dimension==='group'){
        const before=draftStores.length;
        draftStores=draftStores.filter(hasEnabledGroup);
        if(before>draftStores.length)showToast('已移除无启用产品组的店铺');
      }
      setDirty();
      filterStores();
    }
    function hasEnabledGroup(store){return (store.productGroups||[]).some(group=>group.status==='启用')}
    function filteredStores(){
      const name=document.getElementById('nameKeyword').value.trim();
      const id=document.getElementById('idKeyword').value.trim();
      const platform=document.getElementById('platformFilter').value;
      return draftStores.filter(s=>(!name||s.name.includes(name))&&(!id||s.id.includes(id))&&(platform==='全部'||s.platform===platform));
    }
    function render(list=filteredStores()){
      const box=document.getElementById('ruleList');
      if(!list.length){
        box.innerHTML='<div class="empty">暂无数据</div>';
        document.getElementById('totalText').textContent='共 0 条';
        return;
      }
      box.innerHTML = dimension==='store' ? renderStoreDimension(list) : renderGroupDimension(list);
      document.getElementById('totalText').textContent=`共 ${dimension==='store'?list.length:list.reduce((sum,store)=>sum+enabledGroups(store).length,0)} 条`;
    }
    function renderStoreDimension(list){
      const meta=getMeta();
      const rows=list.map(store=>`<tr><td><div class="cell-stack"><div class="store-line"><span class="platform-tag">${store.platform}</span><span>${store.name}</span></div><span class="meta">ID：${store.id}</span></div></td><td><div class="reward-line"><span>${meta.action}</span><input class="field" type="number" min="0" step="0.01" value="${store.threshold||''}" placeholder="${meta.thresholdPlaceholder}" oninput="updateStore('${store.id}','threshold',this.value)"><span>${meta.unit}</span><span>可兑</span><input class="field" type="number" min="1" step="1" value="${store.points||''}" placeholder="请输入积分值" oninput="updateStore('${store.id}','points',this.value)"><span>积分</span></div></td><td><div class="cell-stack"><span>${store.creator||'当前账号'}</span><span class="meta">${store.time||store.createdAt}</span></div></td><td><span class="link danger" onclick="openDelete('${store.id}')">删除</span></td></tr>`).join('');
      return `<div class="rule-card"><div class="rule-head"><div class="rule-left"></div><div class="batch-line"><input class="field" id="storeBatchThreshold" type="number" min="0" step="0.01" placeholder="批量金额"><input class="field" id="storeBatchPoints" type="number" min="1" step="1" placeholder="批量积分"><button class="btn-primary" onclick="applyStoreBatch()">批量设置</button></div></div><div class="reward-table-wrap"><table><thead><tr><th style="width:20%">店铺</th><th style="width:48%">活动积分</th><th style="width:20%">添加时间</th><th style="width:12%">操作</th></tr></thead><tbody>${rows}</tbody></table></div></div>`;
    }
    function renderGroupDimension(list){
      const meta=getMeta();
      const rows=[];
      list.forEach(store=>{
        enabledGroups(store).forEach(group=>{
          rows.push(`<tr><td><span class="link danger" onclick="deleteProductGroupRule('${store.id}',${group.originalIndex})">删除</span></td><td><div class="cell-stack"><div class="store-line"><span class="platform-tag">${store.platform}</span><span>${store.name}</span></div><span class="meta">ID：${store.id}</span></div></td><td><div class="cell-stack"><span>${group.name}</span></div></td><td><div class="reward-line"><span>${meta.action}</span><input class="field" type="number" min="0" step="0.01" value="${group.activityThreshold||group.threshold||''}" placeholder="${meta.thresholdPlaceholder}" oninput="updateGroupByIndex('${store.id}',${group.originalIndex},'threshold',this.value)"><span>${meta.unit}</span><span>可兑</span><input class="field" type="number" min="1" step="1" value="${group.activityPoints||group.points||''}" placeholder="请输入积分值" oninput="updateGroupByIndex('${store.id}',${group.originalIndex},'points',this.value)"><span>积分</span></div></td><td><div class="cell-stack"><span>${store.creator||'当前账号'}</span><span class="meta">${store.time||store.createdAt}</span></div></td></tr>`);
        });
      });
      return `<div class="rule-card"><div class="rule-head"><div class="rule-left"></div><div class="batch-line"><input class="field" id="groupBatchThreshold" type="number" min="0" step="0.01" placeholder="批量金额"><input class="field" id="groupBatchPoints" type="number" min="1" step="1" placeholder="批量积分"><button class="btn-primary" onclick="applyAllGroupBatch()">批量设置</button></div></div><div class="reward-table-wrap"><table><thead><tr><th style="width:20%">操作</th><th style="width:20%">店铺</th><th style="width:14%">产品组</th><th style="width:34%">活动积分</th><th style="width:12%">添加时间</th></tr></thead><tbody>${rows.join('')||'<tr><td colspan="5" class="empty">暂无启用产品组</td></tr>'}</tbody></table></div></div>`;
    }
    function enabledGroups(store){return (store.productGroups||[]).map((group,index)=>({...group,originalIndex:index})).filter(group=>group.status==='启用')}
    function filterStores(){render()}
    function clearSearch(){document.getElementById('nameKeyword').value='';document.getElementById('idKeyword').value='';document.getElementById('platformFilter').value='全部';render()}
    function updateStore(id,key,value){const store=draftStores.find(item=>item.id===id);if(store){store[key]=value;if(key==='threshold')store.activityThreshold=value;if(key==='points')store.activityPoints=value;setDirty()}}
    function updateGroup(storeId,enabledIndex,key,value){
      const store=draftStores.find(item=>item.id===storeId);
      if(!store)return;
      const group=enabledGroups(store)[enabledIndex];
      if(group&&store.productGroups[group.originalIndex]){store.productGroups[group.originalIndex][key]=value;if(key==='threshold')store.productGroups[group.originalIndex].activityThreshold=value;if(key==='points')store.productGroups[group.originalIndex].activityPoints=value;setDirty()}
    }
    function updateGroupByIndex(storeId,index,key,value){
      const store=draftStores.find(item=>item.id===storeId);
      if(store&&store.productGroups[index]){
        store.productGroups[index][key]=value;
        if(key==='threshold')store.productGroups[index].activityThreshold=value;
        if(key==='points')store.productGroups[index].activityPoints=value;
        setDirty();
      }
    }
    function applyStoreBatch(){
      const threshold=document.getElementById('storeBatchThreshold').value;
      const points=document.getElementById('storeBatchPoints').value;
      draftStores=draftStores.map(store=>({...store,threshold,points,activityThreshold:threshold,activityPoints:points}));
      setDirty();render();showToast('已批量设置店铺活动积分');
    }
    function applyGroupBatch(storeId){
      const threshold=document.querySelector(`[data-store="${storeId}"][data-type="threshold"]`)?.value||'';
      const points=document.querySelector(`[data-store="${storeId}"][data-type="points"]`)?.value||'';
      const store=draftStores.find(item=>item.id===storeId);
      if(store){
        store.productGroups=(store.productGroups||[]).map(group=>group.status==='启用'?({...group,threshold,points,activityThreshold:threshold,activityPoints:points}):group);
        setDirty();render();showToast('已批量设置该店铺产品组积分');
      }
    }
    function applyAllGroupBatch(){
      const threshold=document.getElementById('groupBatchThreshold').value;
      const points=document.getElementById('groupBatchPoints').value;
      draftStores=draftStores.map(store=>({
        ...store,
        productGroups:(store.productGroups||[]).map(group=>group.status==='启用'?({...group,threshold,points,activityThreshold:threshold,activityPoints:points}):group)
      }));
      setDirty();render();showToast('已批量设置所有产品组积分');
    }
    function deleteProductGroupRule(storeId,index){
      const store=draftStores.find(item=>item.id===storeId);
      if(store&&store.productGroups[index]){
        store.productGroups.splice(index,1);
        setDirty();render();showToast('已删除该产品组，保存后生效');
      }
    }
    function openStoreModal(){
      renderStorePicker();
      document.getElementById('storeError').style.display='none';
      document.getElementById('mask').classList.add('open');
      document.getElementById('storeModal').classList.add('open');
    }
    function renderStorePicker(){
      const selected=new Set(draftStores.map(store=>store.id));
      const selectedGroupKeys=getSelectedGroupKeys();
      if(dimension==='group'){
        const rows=publicStores.flatMap(store=>{
          const groups=store.productGroups||[];
          if(!groups.length){
            return [`<tr class="picker-row disabled"><td class="picker-check"><input type="checkbox" disabled></td><td><div class="cell-stack"><div class="store-line"><span class="platform-tag">${store.platform}</span><span>${store.name}</span></div><span class="meta">ID：${store.id}</span></div></td><td><div class="cell-stack"><span>未添加产品组</span><span class="disabled-reason">不可选择</span></div></td><td><div class="cell-stack"><span>${store.creator||'账号名称'}</span><span class="meta">${store.createdAt}</span></div></td></tr>`];
          }
          return groups.map((group,index)=>{
            const key=`${store.id}__${group.name}`;
            const selectedNow=selectedGroupKeys.has(key);
            const disabled=selectedNow||group.status!=='启用';
            const reason=selectedNow?'已选择':(group.status!=='启用'?'禁用中的产品组不可选择':'');
            return `<tr class="picker-row ${disabled?'disabled':''}"><td class="picker-check"><input type="checkbox" value="${store.id}__${index}" ${disabled?'':'data-pickable="1" onchange="refreshStorePickerAll()"'} ${selectedNow?'checked ':''}${disabled?'disabled':''}></td><td><div class="cell-stack"><div class="store-line"><span class="platform-tag">${store.platform}</span><span>${store.name}</span></div><span class="meta">ID：${store.id}</span></div></td><td><div class="cell-stack"><span>${group.name}</span>${reason?`<span class="disabled-reason">${reason}</span>`:''}</div></td><td><div class="cell-stack"><span>${store.creator||'账号名称'}</span><span class="meta">${store.createdAt}</span></div></td></tr>`;
          });
        }).join('');
        document.getElementById('storePicker').innerHTML=`<table class="picker-table"><thead><tr><th class="picker-check"></th><th>店铺</th><th>产品组</th><th>创建时间</th></tr></thead><tbody>${rows}</tbody></table>${renderStorePickerSelectAll()}`;
        refreshStorePickerAll();
        return;
      }
      const rows=publicStores.map(store=>{
        const selectedNow=selected.has(store.id);
        const enabledCount=enabledGroups(store).length;
        const cannotUse=dimension==='group'&&enabledCount===0;
        const disabled=selectedNow||cannotUse;
        const reason=selectedNow?'已选择':(cannotUse?((store.productGroups||[]).length?'产品组均未启用':'未添加产品组'):'');
        return `<tr class="picker-row ${disabled?'disabled':''}"><td class="picker-check"><input type="checkbox" value="${store.id}" ${disabled?'':'data-pickable="1" onchange="refreshStorePickerAll()"'} ${selectedNow?'checked ':''}${disabled?'disabled':''}></td><td><div class="cell-stack"><div class="store-line"><span class="platform-tag">${store.platform}</span><span>${store.name}</span></div><span class="meta">ID：${store.id}</span>${reason?`<span class="disabled-reason">${reason}</span>`:''}</div></td><td><div class="cell-stack"><span>${store.creator||'账号名称'}</span><span class="meta">${store.createdAt}</span></div></td></tr>`;
      }).join('');
      document.getElementById('storePicker').innerHTML=`<table class="picker-table"><thead><tr><th class="picker-check"></th><th>店铺</th><th>创建时间</th></tr></thead><tbody>${rows}</tbody></table>${renderStorePickerSelectAll()}`;
      refreshStorePickerAll();
    }
    function confirmStorePicker(){
      const checkedInputs=[...document.querySelectorAll('#storePicker input:checked:not(:disabled)')];
      if(!checkedInputs.length){document.getElementById('storeError').style.display='block';return}
      if(dimension==='group'){
        const storeMap=new Map();
        checkedInputs.forEach(input=>{
          const [storeId,indexText]=input.value.split('__');
          const source=publicStores.find(store=>store.id===storeId);
          const group=source?.productGroups?.[Number(indexText)];
          if(!source||!group||group.status!=='启用')return;
          if(!storeMap.has(storeId)){
            const copy=JSON.parse(JSON.stringify(source));
            copy.time=nowText();
            copy.threshold='';
            copy.points='';
            copy.productGroups=[];
            storeMap.set(storeId,copy);
          }
          storeMap.get(storeId).productGroups.push({...JSON.parse(JSON.stringify(group)),threshold:'',points:''});
        });
        [...storeMap.values()].reverse().forEach(addStore=>{
          const existing=draftStores.find(store=>store.id===addStore.id);
          if(existing){
            const existingNames=new Set((existing.productGroups||[]).map(group=>group.name));
            existing.productGroups=[...(addStore.productGroups||[]).filter(group=>!existingNames.has(group.name)),...(existing.productGroups||[])];
          }else{
            draftStores.unshift(addStore);
          }
        });
      }else{
        const additions=checkedInputs.map(input=>publicStores.find(store=>store.id===input.value)).filter(Boolean).map(store=>{
          const copy=JSON.parse(JSON.stringify(store));
          copy.time=nowText();
          copy.threshold='';
          copy.points='';
          copy.productGroups=(copy.productGroups||[]).map(group=>({...group,threshold:'',points:''}));
          return copy;
        });
        draftStores=[...additions.reverse(),...draftStores];
      }
      closeOverlay();setDirty();render();showToast('已添加店铺，请填写活动积分');
    }
    function getSelectedGroupKeys(){
      const keys=new Set();
      draftStores.forEach(store=>{
        (store.productGroups||[]).forEach(group=>keys.add(`${store.id}__${group.name}`));
      });
      return keys;
    }
    function renderStorePickerSelectAll(){
      return '<label class="picker-select-all"><span class="picker-select-left"><input id="storePickerAll" type="checkbox" onchange="toggleStorePickerAll(this)"><span>全选</span></span><span class="picker-selected-count" id="storePickerCount">已选（0）</span></label>';
    }
    function getPickableStoreInputs(){return [...document.querySelectorAll('#storePicker input[data-pickable="1"]')]}
    function refreshStorePickerAll(){
      const all=document.getElementById('storePickerAll');
      if(!all)return;
      const inputs=getPickableStoreInputs();
      const checked=inputs.filter(input=>input.checked).length;
      const count=document.getElementById('storePickerCount');
      all.disabled=!inputs.length;
      all.checked=inputs.length>0&&checked===inputs.length;
      all.indeterminate=checked>0&&checked<inputs.length;
      if(count)count.textContent=`已选（${checked}）`;
    }
    function toggleStorePickerAll(checkbox){
      getPickableStoreInputs().forEach(input=>input.checked=checkbox.checked);
      refreshStorePickerAll();
    }
    function openDelete(id){deleteTarget={type:'store',id};document.getElementById('mask').classList.add('open');document.getElementById('deleteModal').classList.add('open')}
    function deleteGroupRow(storeId,enabledIndex){deleteTarget={type:'group',storeId,enabledIndex};document.getElementById('mask').classList.add('open');document.getElementById('deleteModal').classList.add('open')}
    function confirmDelete(){
      if(deleteTarget?.type==='store') draftStores=draftStores.filter(store=>store.id!==deleteTarget.id);
      if(deleteTarget?.type==='group'){
        const store=draftStores.find(item=>item.id===deleteTarget.storeId);
        const group=store?enabledGroups(store)[deleteTarget.enabledIndex]:null;
        if(group) store.productGroups.splice(group.originalIndex,1);
      }
      deleteTarget=null;closeOverlay();setDirty();render();showToast('删除成功，保存后生效');
    }
    function savePage(){
      savedStores=JSON.parse(JSON.stringify(draftStores));
      const activities=loadActivities();
      const index=activities.findIndex(item=>item.id===activityId||item.name===activity);
      if(index>=0){
        activities[index].stores=JSON.parse(JSON.stringify(savedStores));
        activities[index].exchangeDimension=dimension==='group'?'店铺产品组维度':'店铺维度';
        activities[index].updatedAt=nowText();
        activities[index].updater='当前账号';
        localStorage.setItem(activityStorageKey,JSON.stringify(activities));
      }
      try{localStorage.setItem('yo_activity_stores_draft',JSON.stringify(savedStores))}catch(e){}
      setDirty(false);
      showToast('保存成功，活动店铺已生效');
    }
    function closeOverlay(){document.getElementById('mask').classList.remove('open');document.querySelectorAll('.modal').forEach(el=>el.classList.remove('open'))}
    function showToast(t){const el=document.getElementById('toast');el.textContent=t;el.classList.add('open');setTimeout(()=>el.classList.remove('open'),1200)}
    function nowText(){const d=new Date();const p=n=>String(n).padStart(2,'0');return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())} ${p(d.getHours())}:${p(d.getMinutes())}:${p(d.getSeconds())}`}
    function openTabContext(e,page){e.preventDefault();const m=document.getElementById('tabContextMenu');m.dataset.page=page||'';m.style.left=`${e.clientX}px`;m.style.top=`${e.clientY}px`;m.classList.add('open')}
    function closeTabContext(){document.getElementById('tabContextMenu').classList.remove('open')}
    function closeCurrentTab(e){if(e)e.stopPropagation();goList()}
    function closeListTab(e){e.stopPropagation();e.currentTarget.closest('.nav-tab').style.display='none'}
    function closeOtherTabs(){closeTabContext();document.querySelectorAll('.nav-tab[data-page]:not(.active)').forEach(tab=>tab.style.display='none')}
    function closeAllTabs(){goList()}
    function goList(){window.location.href='./订单兑换列表.html'}
    document.addEventListener('click',e=>{if(!e.target.closest('#tabContextMenu'))closeTabContext()});
    const workbenchTabsKey='yo_order_exchange_open_tabs_v2';
    const workbenchTabDefs={'order-exchange':{label:'订单兑换',url:'./订单兑换列表.html'},'exchange-data':{label:'兑换数据',url:'./兑换数据.html'},'exchange-audit':{label:'兑换审核',url:'./兑换审核.html'},'public-stores':{label:'公域店铺',url:'./公域店铺列表.html'},'order-limit':{label:'订单限制',url:'./订单限制.html'},'store-form':{label:'店铺新建',url:'./公域店铺新增.html'},'order-form':{label:'订单兑换新增',url:'./订单兑换新增.html'},'activity-store':{label:'活动店铺',url:'./活动店铺.html'}};
    let currentWorkbenchTab='activity-store';
    function getWorkbenchTabs(){try{return JSON.parse(localStorage.getItem(workbenchTabsKey)||'[]')}catch(e){return []}}
    function saveWorkbenchTabs(tabs){localStorage.setItem(workbenchTabsKey,JSON.stringify(tabs))}
    function initWorkbenchTabs(current,label){currentWorkbenchTab=current;const tabs=getWorkbenchTabs().filter(id=>workbenchTabDefs[id]);if(!tabs.includes(current))tabs.push(current);if(label&&workbenchTabDefs[current])workbenchTabDefs[current].label=label;saveWorkbenchTabs(tabs);renderWorkbenchTabs()}
    function renderWorkbenchTabs(){const box=document.querySelector('.nav-tabs');if(!box)return;const tabs=getWorkbenchTabs().filter(id=>workbenchTabDefs[id]);box.innerHTML=`<div class="nav-tab fixed">首页</div>`+tabs.map(id=>`<div class="nav-tab ${id===currentWorkbenchTab?'active':''}" data-page="${id}" onclick="goWorkbenchTab('${id}')" oncontextmenu="openTabContext(event,'${id}')">${workbenchTabDefs[id].label} <span class="tab-close" onclick="closeTab(event,'${id}')">×</span></div>`).join('')}
    function goWorkbenchTab(id){const def=workbenchTabDefs[id];if(def)window.location.href=def.url}
    function closeTab(event,page){if(event)event.stopPropagation();let tabs=getWorkbenchTabs().filter(id=>id!==page);saveWorkbenchTabs(tabs);if(page===currentWorkbenchTab){const next=tabs[tabs.length-1]||'order-exchange';goWorkbenchTab(next)}else renderWorkbenchTabs()}
    function closeCurrentTab(e){if(e)e.stopPropagation();closeTabContext();closeTab(null,document.getElementById('tabContextMenu').dataset.page||currentWorkbenchTab)}
    function closeOtherTabs(){closeTabContext();saveWorkbenchTabs([currentWorkbenchTab]);renderWorkbenchTabs()}
    function closeAllTabs(){closeTabContext();saveWorkbenchTabs(['order-exchange']);goList()}
    if(dimension==='group') document.querySelectorAll('[data-radio-group="dimension"] .radio-pill').forEach(item=>item.classList.toggle('active',item.textContent.includes('店铺产品组')));
    render();
    initWorkbenchTabs('activity-store','活动店铺');
  </script>

<script>
(function(){
  const LOGIC_MD_FILE = './PC逻辑.md';
  const LOGIC_CACHE_KEY = 'logic-md-cache:' + LOGIC_MD_FILE;
  function escapeHtml(text){return String(text).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
  function inlineMd(text){return escapeHtml(text).replace(/`([^`]+)`/g,'<code>$1</code>').replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>')}
  function markdownToHtml(md){
    return String(md||'').replace(/\r\n/g,'\n').split('\n').map(function(raw){
      const line=raw.replace(/\s+$/,'');
      if(!line.trim()) return '';
      if(/^---+$/.test(line.trim())) return '<hr>';
      const h=line.match(/^(#{1,6})\s+(.*)$/);
      if(h){const lvl=Math.min(h[1].length,4);return '<h'+lvl+'>'+inlineMd(h[2])+'</h'+lvl+'>'}
      const quote=line.match(/^>\s?(.*)$/);
      if(quote) return '<blockquote>'+inlineMd(quote[1])+'</blockquote>';
      const item=line.match(/^(\s*)([-*]|\d+(?:\.\d+)*\.)\s+(.*)$/);
      if(item){const indent=Math.floor(item[1].replace(/\t/g,'    ').length/2)*18;return '<p class="prd-line" style="padding-left:'+indent+'px"><span class="prd-marker">'+escapeHtml(item[2])+'</span> '+inlineMd(item[3])+'</p>'}
      return '<p>'+inlineMd(line.trim())+'</p>';
    }).join('\n');
  }
  function renderLogic(md, source){const box=document.getElementById('logicContent');if(!box)return;box.innerHTML=markdownToHtml(md);if(source)box.insertAdjacentHTML('afterbegin','<blockquote>当前逻辑读取来源：'+escapeHtml(source)+'</blockquote>')}
  function setLogicPickerVisible(visible){document.querySelectorAll('.logic-file-picker').forEach(function(node){node.style.display=visible?'inline-flex':'none'})}
  function showLogicError(err){const box=document.getElementById('logicContent');if(!box)return;setLogicPickerVisible(true);const cached=localStorage.getItem(LOGIC_CACHE_KEY);if(cached){renderLogic(cached,'本地缓存（同目录 Markdown 自动读取失败，请点击「选择文件」兜底更新）');box.insertAdjacentHTML('afterbegin','<div class="logic-load-error">同目录在线逻辑读取失败，已临时展示缓存内容。请确认 '+escapeHtml(LOGIC_MD_FILE)+' 与 HTML 位于同一目录，或点击右上角「选择文件」。<br>错误信息：'+escapeHtml(err&&err.message?err.message:err)+'</div>');return}box.innerHTML='<div class="logic-load-error">未能读取同目录逻辑文件 '+escapeHtml(LOGIC_MD_FILE)+'。请确认 md 与 HTML 位于同一目录，并通过 GitHub Pages / 本地 http 服务打开；如果当前是 file:// 直接打开，浏览器可能会拦截读取。可点击右上角「选择文件」手动载入。<br>错误信息：'+escapeHtml(err&&err.message?err.message:err)+'</div>'}
  window.refreshLogicMarkdown=function(force){if(force)localStorage.removeItem(LOGIC_CACHE_KEY);setLogicPickerVisible(false);const box=document.getElementById('logicContent');if(box)box.innerHTML='<p>正在读取同目录逻辑文件 '+escapeHtml(LOGIC_MD_FILE)+'...</p>';const url=LOGIC_MD_FILE+(LOGIC_MD_FILE.indexOf('?')>-1?'&':'?')+'_t='+Date.now();fetch(url,{cache:'no-store'}).then(function(res){if(!res.ok)throw new Error('HTTP '+res.status);return res.text()}).then(function(md){localStorage.setItem(LOGIC_CACHE_KEY,md);setLogicPickerVisible(false);renderLogic(md,LOGIC_MD_FILE)}).catch(function(err){showLogicError(err)})};
  window.handleLogicFileSelect=function(input){const file=input&&input.files&&input.files[0];if(!file)return;const reader=new FileReader();reader.onload=function(){const md=String(reader.result||'');localStorage.setItem(LOGIC_CACHE_KEY,md);renderLogic(md,file.name);setLogicPickerVisible(true);input.value=''};reader.readAsText(file,'utf-8')};
  if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',window.refreshLogicMarkdown);else window.refreshLogicMarkdown();
})();
</script>
</body>
</html>
