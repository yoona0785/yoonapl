<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>兑换审核</title>
  <style>
    :root{--primary:#051D86;--primary-hover:#0a2aa0;--primary-light:#EBF0FF;--text-main:#333;--text-sub:#666;--text-hint:#aaa;--text-error:#f00;--text-warn:#FF7800;--success:#52C41A;--bg-page:#F4F6F9;--bg-white:#fff;--bg-hover:#F0F3FF;--border:#ECECEC;--divider:#F2F2F2;--nav-h:48px;--sidebar-w:160px;--logic-w:820px;font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif}
    *{box-sizing:border-box}
    body{margin:0;background:#eef2f7;color:var(--text-main)}
    button,input,select,textarea{font:inherit}
    .workbench{display:flex;min-height:100vh}
    .logic-panel{width:56px;background:#f7f9fc;border-right:1px solid var(--border);transition:width .22s ease;overflow:hidden;flex:0 0 auto}
    .logic-panel.expanded{width:var(--logic-w)}
    .logic-toolbar{height:56px;display:flex;align-items:center;justify-content:center;border-bottom:1px solid var(--border);background:#fff}
    .logic-toggle{height:32px;padding:0 12px;border:1px solid var(--border);background:#fff;color:var(--primary);border-radius:4px;cursor:pointer;white-space:nowrap}
    .logic-paper-wrap{padding:16px}
    .logic-paper{width:794px;min-height:1123px;background:#fff;border:1px solid var(--border);border-radius:10px;padding:32px 40px;box-shadow:0 4px 14px rgba(19,31,55,.04)}
    .logic-panel:not(.expanded) .logic-paper-wrap{display:none}
    .logic-paper h1{margin:0 0 18px;font-size:20px}
    .logic-paper h2{margin:24px 0 10px;font-size:16px}
    .logic-paper li{font-size:14px;line-height:1.8;color:#4b5563}
    .logic-paper ol{margin:0;padding-left:20px}
    .preview-stage{flex:1;min-width:0;padding:16px}
    .app-shell{min-height:calc(100vh - 32px);background:var(--bg-page);border:1px solid #e8ecf2;border-radius:14px;overflow:hidden}
    .topnav{display:flex;align-items:stretch;height:var(--nav-h);background:#fff;border-bottom:1px solid var(--border)}
    .nav-logo{width:160px;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;color:var(--primary);border-right:1px solid var(--border);flex:0 0 auto}
    .nav-toggle{width:44px;display:flex;align-items:center;justify-content:center;color:#5d6470;cursor:pointer;flex:0 0 auto}
    .nav-tabs{display:flex;align-items:stretch;gap:4px;padding:0 12px;flex:1;overflow:auto}
    .nav-tab{position:relative;display:flex;align-items:center;gap:6px;padding:0 14px;font-size:14px;color:#666;white-space:nowrap;cursor:pointer}
    .nav-tab.active{color:var(--primary);font-weight:600}
    .nav-tab.active::after{content:"";position:absolute;left:12px;right:12px;bottom:0;height:2px;background:var(--primary)}
    .tab-close{display:inline;font-size:12px;color:#a0a6b2;cursor:pointer}
    .nav-tab.fixed .tab-close{display:none!important}
    .nav-right{display:flex;align-items:center;padding:0 16px;color:#666;border-left:1px solid var(--border);flex:0 0 auto}
    .main-wrap{display:flex;min-height:calc(100vh - 32px - 48px)}
    .sidebar{width:var(--sidebar-w);background:#fff;border-right:1px solid var(--border);flex:0 0 auto;padding:12px 0;transition:width .22s ease;overflow:hidden}
    .sb-search{padding:0 12px 12px}
    .sb-search input{width:100%;height:30px;border:1px solid var(--border);border-radius:5px;padding:0 10px;font-size:13px;outline:none}
    .m1{height:40px;padding:0 12px;display:flex;align-items:center;gap:8px;cursor:pointer;color:var(--primary);background:var(--bg-hover)}
    .m1-icon svg{width:18px;height:18px;stroke:var(--primary);fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round}
    .m1-label{font-size:14px;flex:1}
    .m1-arrow{font-size:14px;transform:rotate(90deg)}
    .m2-wrap{padding:2px 8px 8px}
    .m2-item{height:32px;padding:0 8px;display:flex;align-items:center;border-radius:4px;color:var(--primary);background:var(--primary-light);font-size:12px;font-weight:600}
    .sidebar.collapsed{width:44px}
    .sidebar.collapsed .sb-search,.sidebar.collapsed .m1-label,.sidebar.collapsed .m1-arrow,.sidebar.collapsed .m2-wrap{display:none}
    .sidebar.collapsed .m1{justify-content:center;padding:0}
    .content{flex:1;min-width:0;padding:16px}
    .canvas{min-height:calc(100vh - 32px - 48px - 32px);background:#fff;border:1px solid var(--border);border-radius:12px;padding:0 16px 18px}
    .page-head{height:58px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--divider);margin:0 -16px;padding:0 18px}
    .breadcrumb{font-size:15px;color:#333;font-weight:600}
    .breadcrumb .back{color:var(--primary);cursor:pointer;margin-right:6px}
    .toolbar{display:flex;justify-content:space-between;gap:16px;padding:16px 0}
    .search-group{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
    .field{height:32px;border:1px solid var(--border);border-radius:4px;background:#fff;padding:0 12px;font-size:13px;color:#333;outline:none}
    .field:focus{border-color:var(--primary)}
    .input{width:180px}
    .select{width:150px}
    .icon-btn{height:32px;width:20px;border:none;background:transparent;padding:0;display:flex;align-items:center;justify-content:center;cursor:pointer}
    .icon-btn:hover{opacity:.72}
    .icon-btn svg{width:16px;height:16px;stroke:#333;fill:none;stroke-width:1.8}
    .link-btn,.link{color:var(--primary);cursor:pointer;font-size:13px}
    .danger{color:var(--text-error)}
    .btn-primary,.btn-secondary{height:32px;border-radius:4px;padding:0 14px;cursor:pointer;font-size:14px}
    .btn-primary{background:var(--primary);border:none;color:#fff}
    .btn-primary:hover{background:var(--primary-hover)}
    .btn-secondary{background:#fff;border:1px solid var(--border);color:#333}
    table{width:100%;border-collapse:collapse;background:#fff;box-shadow:0px 1px 0px 1px #EFEDED;border-radius:0}
    th{height:40px;background:#f7f8fa;color:#333;font-size:13px;text-align:left;font-weight:600;border-bottom:1px solid var(--divider);padding:0 14px}
    td{height:68px;border-bottom:1px solid var(--divider);padding:10px 14px;font-size:13px;vertical-align:middle}
    .cell-stack{display:flex;flex-direction:column;gap:6px;min-width:0}
    .event-type,.platform-tag{height:18px;padding:0 4px;border-radius:2px;background:#4f8fd8;color:#fff;font-size:12px;line-height:18px;display:inline-flex;width:max-content}
    .event-name,.user-name{color:var(--primary);cursor:pointer;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:220px;font-weight:400}
    .activity-info{display:flex;flex-direction:column;align-items:flex-start;gap:6px}
    .meta{font-size:12px;color:#999}
    .image-list{display:flex;gap:6px}
    .image-thumb{width:42px;height:42px;border:1px solid var(--border);border-radius:4px;background:linear-gradient(135deg,#eef2ff,#fff);display:flex;align-items:center;justify-content:center;color:#999;cursor:pointer;font-size:12px}
    .status{
      min-width:44px;
      height:22px;
      padding:0 6px;
      border-radius:3px;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      font-size:13px;
      font-weight:400;
      line-height:22px;
      white-space:nowrap;
    }
    .status.pending{color:#ff8a00;background:#fff3e5}
    .status.pass{color:#14c45a;background:#e8fff0}
    .status.reject{color:#ff4d4f;background:#fff1f0}
    .status.disabled{color:#999;background:#f5f5f5}
    .audit-status{width:46px;min-width:46px;height:20px;padding:0;font-size:12px;line-height:20px}
    .point-text{color:var(--primary);font-weight:400}
    .audit-opinion{font-size:12px;color:#666;line-height:1.5;white-space:normal;max-width:180px}
    .action-links .link{font-weight:400}
    .action-links{display:flex;align-items:center;gap:12px}
    .footer-bar{height:52px;display:flex;align-items:center;gap:10px;justify-content:flex-end;color:#666;font-size:13px}
    .page-num{min-width:28px;height:28px;border:1px solid var(--border);border-radius:4px;display:inline-flex;align-items:center;justify-content:center}
    .page-num.active{background:var(--primary);border-color:var(--primary);color:#fff}
    .empty-row{height:120px;text-align:center;color:#999}
    .mask{display:none;position:fixed;inset:0;background:rgba(0,0,0,.42);z-index:1000}
    .mask.open{display:block}
    .modal{display:none;position:fixed;left:50%;top:50%;transform:translate(-50%,-50%);width:520px;background:#fff;border-radius:8px;box-shadow:0 8px 32px rgba(0,0,0,.16);z-index:1001}
    .modal.open{display:block}
    .modal-header{height:56px;padding:0 20px;display:flex;align-items:center;justify-content:space-between;font-size:16px;font-weight:600;border-bottom:1px solid var(--divider)}
    .modal-close{font-size:24px;color:#999;cursor:pointer}
    .modal-body{padding:18px 20px;font-size:14px;color:#555;line-height:1.7}
    .modal-footer{padding:0 20px 20px;display:flex;justify-content:flex-end;gap:10px}
    .drawer{display:none;position:fixed;right:0;top:0;bottom:0;width:560px;background:#fff;z-index:1002;box-shadow:-8px 0 28px rgba(0,0,0,.12)}
    .drawer.open{display:block}
    .drawer-body{height:calc(100vh - 112px);overflow:auto;padding:20px}
    .drawer-footer{height:56px;border-top:1px solid var(--divider);display:flex;align-items:center;justify-content:flex-end;gap:10px;padding:0 20px}
    .audit-section{margin-bottom:22px}
    .audit-section-title{font-size:15px;font-weight:600;color:#333;margin:0 0 14px;padding-left:10px;border-left:3px solid var(--primary);line-height:20px}
    .detail-grid{display:grid;grid-template-columns:110px 1fr;gap:14px 12px;font-size:14px;margin-bottom:18px}
    .detail-grid label{color:#666}
    .audit-section .detail-grid{margin-bottom:0}
    .radio-row{display:flex;gap:12px;align-items:center}
    .radio-pill{height:32px;display:inline-flex;align-items:center;border:1px solid var(--border);border-radius:4px;padding:0 14px;cursor:pointer;background:#fff}
    .radio-pill.active{background:var(--primary);border-color:var(--primary);color:#fff}
    textarea.field{height:auto;min-height:86px;padding:10px 12px;line-height:1.6;resize:vertical;width:100%}
    .form-row{display:grid;grid-template-columns:110px 1fr;gap:12px;margin-bottom:16px}
    .form-row label{font-size:13px;color:#666;line-height:32px}
    .required::before{content:"*";color:var(--text-error);margin-right:4px}
    .error-text{font-size:12px;color:var(--text-error);margin-top:6px;display:none}
    .toast{display:none;position:fixed;top:62px;left:50%;transform:translateX(-50%);background:#fff;border:1px solid #b7eb8f;color:#135200;border-radius:6px;padding:10px 16px;z-index:2000;font-size:14px;box-shadow:0 8px 24px rgba(0,0,0,.12)}
    .toast.open{display:block}
    .tab-context-menu{display:none;position:fixed;z-index:3000;width:132px;background:#fff;border:1px solid #e8ecf0;border-radius:4px;box-shadow:0 8px 24px rgba(0,0,0,.12);padding:4px 0}
    .tab-context-menu.open{display:block}
    .tab-context-menu div{height:32px;display:flex;align-items:center;padding:0 14px;font-size:13px;color:#333;cursor:pointer}
    .tab-context-menu div:hover{background:var(--primary-light);color:var(--primary)}
  
    /* 最新 prototype-design 双栏工作台规范：左侧逻辑展开40%，右侧原型60%，默认竖向收起 */
    .workbench{display:flex;min-height:100vh;width:100%}
    .logic-panel{width:48px!important;flex:0 0 48px!important;background:#f7f9fc;border-right:1px solid var(--border,#ECECEC);transition:width .22s ease,flex-basis .22s ease;overflow:hidden;cursor:pointer}
    .logic-panel.expanded{width:40%!important;flex-basis:40%!important;cursor:default}
    .logic-toolbar{height:100vh!important;width:48px!important;display:flex!important;align-items:center!important;justify-content:center!important;border-bottom:none!important;background:#fff!important}
    .logic-panel.expanded .logic-toolbar{height:48px!important;width:auto!important;border-bottom:1px solid var(--border,#ECECEC)!important}
    .logic-toggle{width:100%!important;height:100%!important;border:none!important;background:transparent!important;color:var(--primary,#051D86)!important;border-radius:0!important;padding:0!important;cursor:pointer!important;white-space:nowrap!important;writing-mode:vertical-rl!important;letter-spacing:2px!important;font-size:13px!important;font-weight:600!important}
    .logic-panel.expanded .logic-toggle{width:auto!important;height:32px!important;border:1px solid var(--border,#ECECEC)!important;border-radius:4px!important;padding:0 12px!important;writing-mode:horizontal-tb!important;letter-spacing:0!important;background:#fff!important}
    .logic-paper-wrap{height:calc(100vh - 48px)!important;overflow:auto!important;padding:16px!important}
    .logic-panel:not(.expanded) .logic-paper-wrap{display:none!important}
    .logic-paper{width:auto!important;max-width:none!important;min-height:calc(100vh - 84px)!important;background:#fff!important;border:1px solid var(--border,#ECECEC)!important;border-radius:10px!important;padding:28px 32px!important;box-shadow:0 4px 14px rgba(19,31,55,.04)!important}
    .preview-stage,.preview{flex:1 1 auto!important;min-width:0!important;max-width:none!important}
    .logic-panel.expanded + .preview-stage,.logic-panel.expanded + .preview{flex:0 0 60%!important;max-width:60%!important;overflow:auto!important}

  
    .logic-paper h1{margin:0 0 18px!important;font-size:22px!important;line-height:1.45!important;color:#1f2937!important}
    .logic-paper h2{margin:28px 0 12px!important;font-size:18px!important;line-height:1.5!important;color:#111827!important;border-left:4px solid var(--primary,#051D86)!important;padding-left:10px!important}
    .logic-paper h3{margin:20px 0 10px!important;font-size:16px!important;line-height:1.5!important;color:#1f2937!important}
    .logic-paper h4{margin:16px 0 8px!important;font-size:14px!important;line-height:1.5!important;color:#374151!important}
    .logic-paper p,.logic-paper li,.logic-paper blockquote{font-size:14px!important;line-height:1.85!important;color:#4b5563!important}
    .logic-paper p{margin:8px 0!important}
    .logic-paper ul,.logic-paper ol{margin:8px 0 12px!important;padding-left:22px!important}
    .logic-paper li{margin:4px 0!important}
    .logic-paper blockquote{margin:10px 0!important;padding:10px 12px!important;background:#f7f9fc!important;border-left:3px solid #d8dfef!important;border-radius:4px!important}
    .logic-paper hr{border:none!important;border-top:1px solid var(--border,#ECECEC)!important;margin:18px 0!important}
    .logic-paper code{font-family:Menlo,Consolas,monospace!important;font-size:12px!important;background:#f4f6f9!important;border:1px solid #e5e7eb!important;border-radius:4px!important;padding:1px 5px!important;color:#374151!important}
    .logic-paper strong{font-weight:700!important;color:#1f2937!important}
    .logic-paper .prd-index{font-weight:600!important;color:#374151!important}

    .logic-paper .prd-line{margin:6px 0!important;font-size:14px!important;line-height:1.85!important;color:#4b5563!important}
    .logic-paper .prd-marker{display:inline-block;min-width:22px;font-weight:600;color:#374151!important}

    .logic-source-bar{display:flex;align-items:center;gap:10px;justify-content:space-between;margin:-4px 0 18px;padding:10px 12px;background:#f7f9fc;border:1px solid var(--border,#ECECEC);border-radius:8px;color:#667085;font-size:13px}
    .logic-source-bar code{font-family:Menlo,Consolas,monospace;font-size:12px;background:#fff;border:1px solid #e5e7eb;border-radius:4px;padding:2px 6px;color:#374151}
    .logic-source-actions{display:flex;align-items:center;gap:8px}
    .logic-source-actions button,.logic-source-actions label{height:28px;padding:0 10px;border:1px solid var(--border,#ECECEC);border-radius:4px;background:#fff;color:var(--primary,#051D86);font-size:12px;line-height:26px;cursor:pointer}
    .logic-source-actions input{display:none}
    .logic-content .prd-line{margin:6px 0!important;font-size:14px!important;line-height:1.85!important;color:#4b5563!important}
    .logic-content .prd-marker{display:inline-block;min-width:22px;font-weight:600;color:#374151!important}
    .logic-load-error{padding:12px;background:#fff7ed;border:1px solid #fed7aa;border-radius:8px;color:#9a3412;line-height:1.7;font-size:13px}
</style>
</head>
<body>
  <div class="workbench">
    <aside class="logic-panel" id="logicPanel">
      <div class="logic-toolbar" onclick="toggleLogic()"><button class="logic-toggle" type="button">展开逻辑</button></div>
      <div class="logic-paper-wrap">
        <div class="logic-paper">
          <div class="logic-source-bar">
            <span>业务逻辑来源：<code>PC逻辑.md</code></span>
            <span class="logic-source-actions">
              <button type="button" onclick="refreshLogicMarkdown(true)">刷新逻辑</button>
              <label class="logic-file-picker" style="display:none">选择文件<input type="file" accept=".md,.txt,text/markdown,text/plain" onchange="handleLogicFileSelect(this)"></label>
            </span>
          </div>
          <div id="logicContent" class="logic-content"><p>正在读取 PC逻辑.md...</p></div>
        
        </div>
      </div>
    </aside>
    <main class="preview-stage">
      <div class="app-shell">
        <nav class="topnav">
          <div class="nav-logo">品牌运营系统</div>
          <div class="nav-toggle" onclick="toggleSidebar()">☰</div>
          <div class="nav-tabs">
            <div class="nav-tab fixed">首页</div>
            <div class="nav-tab" data-page="order-exchange" onclick="goOrderList()" oncontextmenu="openTabContext(event,'order-exchange')">订单兑换 <span class="tab-close" onclick="closeOrderTab(event)">×</span></div>
            <div class="nav-tab active" data-page="exchange-audit" oncontextmenu="openTabContext(event,'exchange-audit')">兑换审核 <span class="tab-close" onclick="closeCurrentTab(event)">×</span></div>
          </div>
          <div class="nav-right">账户名称 ▾</div>
        </nav>
        <div class="main-wrap">
          <aside class="sidebar" id="sidebar">
            <div class="sb-search"><input placeholder="搜索报表" /></div>
            <div class="m1">
              <span class="m1-icon"><svg viewBox="0 0 24 24"><path d="M3.75 7.5h5l1.8 2.1h9.7v7.9a2 2 0 0 1-2 2H5.75a2 2 0 0 1-2-2z"></path><path d="M3.75 7.5a2 2 0 0 1 2-2h4.3l1.7 2h6.5a2 2 0 0 1 2 2v.1"></path></svg></span>
              <span class="m1-label">营销中心</span><span class="m1-arrow">›</span>
            </div>
            <div class="m2-wrap"><div class="m2-item">订单兑换</div></div>
          </aside>
          <section class="content">
            <div class="canvas">
              <div class="page-head"><div class="breadcrumb"><span class="back" onclick="goOrderList()">‹ 订单兑换</span> / 兑换审核</div></div>
              <div class="toolbar">
                <div class="search-group">
                  <input class="field input" id="userKeyword" placeholder="请输入用户ID/手机号" oninput="filterAudits()" />
                  <input class="field input" id="nickKeyword" placeholder="请输入用户昵称" oninput="filterAudits()" />
                  <select class="field select" id="activityFilter" style="width:220px" onchange="filterAudits()">
                    <option>全部活动</option>
                    <option>618 店铺订单兑换活动</option>
                    <option>春季会员订单兑换计划（长期有效）</option>
                    <option>年货节积分兑换活动</option>
                    <option>已删除活动：老客回流订单兑换</option>
                  </select>
                  <select class="field select" id="statusFilter" onchange="filterAudits()">
                    <option>全部</option>
                    <option>待审核</option>
                    <option>通过</option>
                    <option>驳回</option>
                  </select>
                  <button class="icon-btn" title="搜索" onclick="filterAudits()"><svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="6"></circle><path d="M20 20l-4.2-4.2"></path></svg></button>
                  <span class="link-btn" onclick="clearSearch()">清空</span>
                </div>
              </div>
              <table>
                <thead>
                  <tr>
                    <th style="width:20%">提交内容</th>
                    <th style="width:18%">活动信息</th>
                    <th style="width:15%">用户信息</th>
                    <th style="width:13%">提交时间</th>
                    <th style="width:14%">审核时间</th>
                    <th style="width:12%">审核状态</th>
                    <th style="width:8%">操作</th>
                  </tr>
                </thead>
                <tbody id="auditTbody"></tbody>
              </table>
              <div class="footer-bar"><span id="totalText">共 0 条</span><span class="page-num">‹</span><span class="page-num active">1</span><span class="page-num">›</span></div>
            </div>
          </section>
        </div>
      </div>
    </main>
  </div>

  <div class="mask" id="mask" onclick="closeOverlay()"></div>
  <div class="tab-context-menu" id="tabContextMenu">
    <div onclick="closeCurrentTab()">关闭当前</div>
    <div onclick="closeOtherTabs()">关闭其他</div>
    <div onclick="closeAllTabs()">关闭全部</div>
  </div>
  <div class="modal" id="imageModal">
    <div class="modal-header"><span>截图预览</span><span class="modal-close" onclick="closeOverlay()">×</span></div>
    <div class="modal-body" id="imagePreview" style="height:260px;display:flex;align-items:center;justify-content:center;background:#f7f8fa;color:#999"></div>
    <div class="modal-footer"><button class="btn-primary" onclick="closeOverlay()">好的，知道了</button></div>
  </div>
  <aside class="drawer" id="auditDrawer">
    <div class="modal-header"><span>兑换审核</span><span class="modal-close" onclick="closeOverlay()">×</span></div>
    <div class="drawer-body">
      <section class="audit-section">
        <h3 class="audit-section-title">审核信息</h3>
        <div class="form-row">
          <label class="required">审核结果</label>
          <div>
            <div class="radio-row" data-radio-group="auditResult">
              <span class="radio-pill" onclick="selectResult(this,'通过')">通过</span>
              <span class="radio-pill" onclick="selectResult(this,'驳回')">驳回</span>
            </div>
            <div class="error-text" id="resultError">请选择审核结果</div>
          </div>
        </div>
        <div class="form-row" id="pointsRow" style="display:none">
          <label class="required">兑换积分</label>
          <div><input class="field" id="pointsInput" type="number" min="1" step="1" placeholder="请输入正整数积分" /><div class="error-text" id="pointsError">请输入正整数积分</div></div>
        </div>
        <div class="form-row">
          <label id="opinionLabel">审核意见</label>
          <div><textarea class="field" id="opinionInput" maxlength="200" placeholder="请输入审核意见，200字内"></textarea><div class="error-text" id="opinionError">请填写审核意见</div></div>
        </div>
      </section>
      <section class="audit-section">
        <h3 class="audit-section-title">提交信息</h3>
        <div class="detail-grid" id="auditDetail"></div>
      </section>
    </div>
    <div class="drawer-footer"><button class="btn-secondary" onclick="closeOverlay()">取消</button><button class="btn-primary" onclick="saveAudit()">保存</button></div>
  </aside>
  <div class="toast" id="toast">保存成功</div>

  <script>
    const auditStorageKey='yo_order_exchange_audits_v1';
    const defaultAudits=[
      {id:'A001',platform:'天猫',store:'天猫官方旗舰店',screens:['订单详情图','平台账号ID图'],remark:'订单号接口未查到，补充截图申请人工审核。',activityStatus:'进行中',activity:'618 店铺订单兑换活动',activityId:'OE202604170001',nick:'林小九',phone:'138****1024',userId:'U20260418001',submittedAt:'2026-04-18 11:20:33',auditUser:'',auditedAt:'',status:'待审核',points:'',opinion:''},
      {id:'A002',platform:'京东',store:'京东自营店铺',screens:['订单详情图','平台账号ID图'],remark:'',activityStatus:'进行中',activity:'春季会员订单兑换计划（长期有效）',activityId:'OE202604100014',nick:'Momo',phone:'136****4408',userId:'U20260418018',submittedAt:'2026-04-18 09:40:12',auditUser:'运营管理员A',auditedAt:'2026-04-18 10:02:08',status:'通过',points:'300',opinion:'截图信息完整，已发放积分。'},
      {id:'A003',platform:'抖音',store:'抖音品牌店',screens:['订单详情图','平台账号ID图'],remark:'订单截图不清晰',activityStatus:'已结束',activity:'年货节积分兑换活动',activityId:'OE202603020021',nick:'陈晨',phone:'139****6632',userId:'U20260328009',submittedAt:'2026-03-28 14:16:03',auditUser:'账号名称B',auditedAt:'2026-03-28 16:18:40',status:'驳回',points:'',opinion:'平台账号 ID 与提交用户不一致。'}
    ];
    function loadAudits(){
      try{
        const saved=JSON.parse(localStorage.getItem(auditStorageKey)||'[]');
        return saved.length?saved:defaultAudits;
      }catch(e){
        return defaultAudits;
      }
    }
    function persistAudits(){localStorage.setItem(auditStorageKey,JSON.stringify(audits))}
    let audits=loadAudits();
    let currentAuditId='';
    let currentResult='';
    function toggleLogic(){const panel=document.getElementById('logicPanel');const btn=panel.querySelector('.logic-toggle');panel.classList.toggle('expanded');btn.textContent=panel.classList.contains('expanded')?'收起逻辑':'展开逻辑'}
    function toggleSidebar(){document.getElementById('sidebar').classList.toggle('collapsed')}
    function renderAudits(list=audits){
      const tbody=document.getElementById('auditTbody');
      if(!list.length){tbody.innerHTML='<tr><td class="empty-row" colspan="7">暂无审核数据</td></tr>'}
      else{tbody.innerHTML=list.map(item=>`<tr><td><div class="cell-stack"><div><span class="platform-tag">${item.platform}</span> ${item.store}</div><div class="image-list">${item.screens.map((img,index)=>`<span class="image-thumb" onclick="previewImage('${item.id}',${index})">图${index+1}</span>`).join('')}</div>${item.remark?`<span class="meta">补充说明：${item.remark}</span>`:''}</div></td><td><div class="activity-info"><span class="event-name" onclick="goActivityDetail('${item.activityId}')">${item.activity}</span><span class="meta">ID：${item.activityId}</span><span class="status ${item.activityStatus==='进行中'?'pass':'reject'}">${item.activityStatus}</span></div></td><td><div class="cell-stack"><span class="user-name" onclick="goUserDetail('${item.userId}')">${item.nick}</span><span class="meta">手机号：${item.phone}</span><span class="meta">用户ID：${item.userId}</span></div></td><td>${item.submittedAt}</td><td>${item.auditedAt?`<div class="cell-stack"><span>${item.auditUser}</span><span class="meta">${item.auditedAt}</span></div>`:'-'}</td><td><div class="cell-stack"><span class="status audit-status ${statusClass(item.status)}">${item.status}</span><span class="point-text">${item.points?`${item.points} 积分`:'-'}</span><span class="audit-opinion">${item.opinion||'-'}</span></div></td><td><div class="action-links">${item.status==='待审核'?`<span class="link" onclick="openAuditDrawer('${item.id}')">审核</span>`:''}</div></td></tr>`).join('')}
      document.getElementById('totalText').textContent=`共 ${list.length} 条`;
    }
    function statusClass(status){return status==='待审核'?'pending':status==='通过'?'pass':'reject'}
    function filterAudits(){
      const user=document.getElementById('userKeyword').value.trim();
      const nick=document.getElementById('nickKeyword').value.trim();
      const activity=document.getElementById('activityFilter').value;
      const status=document.getElementById('statusFilter').value;
      const list=audits.filter(item=>(!user||item.userId===user||item.phone===user)&&(!nick||item.nick.includes(nick))&&(activity==='全部活动'||item.activity===activity)&&(status==='全部'||item.status===status));
      renderAudits(list);
    }
    function clearSearch(){document.getElementById('userKeyword').value='';document.getElementById('nickKeyword').value='';document.getElementById('activityFilter').value='全部活动';document.getElementById('statusFilter').value='全部';renderAudits()}
    function previewImage(id,index){const item=audits.find(a=>a.id===id);document.getElementById('imagePreview').textContent=`${item.screens[index]} 放大预览`;document.getElementById('mask').classList.add('open');document.getElementById('imageModal').classList.add('open')}
    function previewOpinion(id){const item=audits.find(a=>a.id===id);document.getElementById('imagePreview').textContent=item.opinion||'暂无审核意见';document.getElementById('mask').classList.add('open');document.getElementById('imageModal').classList.add('open')}
    function openAuditDrawer(id){
      currentAuditId=id;currentResult='';
      const item=audits.find(a=>a.id===id);
      document.getElementById('auditDetail').innerHTML=`<label>下单平台</label><div>${item.platform}</div><label>店铺名称</label><div>${item.store}</div><label>截图</label><div class="image-list">${item.screens.map((img,index)=>`<span class="image-thumb" onclick="previewImage('${item.id}',${index})">图${index+1}</span>`).join('')}</div><label>补充说明</label><div>${item.remark||'-'}</div><label>用户信息</label><div>${item.nick} / ${item.phone} / ${item.userId}</div>`;
      document.querySelectorAll('[data-radio-group="auditResult"] .radio-pill').forEach(pill=>pill.classList.remove('active'));
      document.getElementById('pointsInput').value='';
      document.getElementById('opinionInput').value='';
      document.getElementById('pointsRow').style.display='none';
      document.getElementById('opinionLabel').classList.remove('required');
      document.querySelectorAll('.error-text').forEach(el=>el.style.display='none');
      document.getElementById('mask').classList.add('open');
      document.getElementById('auditDrawer').classList.add('open');
    }
    function selectResult(el,result){
      el.parentElement.querySelectorAll('.radio-pill').forEach(pill=>pill.classList.remove('active'));
      el.classList.add('active');
      currentResult=result;
      document.getElementById('pointsRow').style.display=result==='通过'?'grid':'none';
      document.getElementById('opinionLabel').classList.toggle('required',result==='驳回');
      document.getElementById('resultError').style.display='none';
    }
    function saveAudit(){
      document.querySelectorAll('.error-text').forEach(el=>el.style.display='none');
      const points=document.getElementById('pointsInput').value.trim();
      const opinion=document.getElementById('opinionInput').value.trim();
      let valid=true;
      if(!currentResult){document.getElementById('resultError').style.display='block';valid=false}
      if(currentResult==='通过'&&!/^[1-9]\d*$/.test(points)){document.getElementById('pointsError').style.display='block';valid=false}
      if(currentResult==='驳回'&&!opinion){document.getElementById('opinionError').style.display='block';valid=false}
      if(!valid)return;
      audits=audits.map(item=>item.id===currentAuditId?{...item,status:currentResult,points:currentResult==='通过'?points:'',opinion,auditUser:'当前账号',auditedAt:nowText()}:item);
      persistAudits();
      closeOverlay();filterAudits();showToast('审核保存成功');
    }
    function nowText(){const d=new Date();const p=n=>String(n).padStart(2,'0');return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())} ${p(d.getHours())}:${p(d.getMinutes())}:${p(d.getSeconds())}`}
    function closeOverlay(){document.getElementById('mask').classList.remove('open');document.querySelectorAll('.modal,.drawer').forEach(node=>node.classList.remove('open'))}
    function showToast(message){const toast=document.getElementById('toast');toast.textContent=message;toast.classList.add('open');setTimeout(()=>toast.classList.remove('open'),1200)}
    function openTabContext(event,page){event.preventDefault();const menu=document.getElementById('tabContextMenu');menu.dataset.page=page||'';menu.style.left=`${event.clientX}px`;menu.style.top=`${event.clientY}px`;menu.classList.add('open')}
    function closeTabContext(){document.getElementById('tabContextMenu').classList.remove('open')}
    function closeCurrentTab(event){if(event)event.stopPropagation();closeTabContext();goOrderList()}
    function closeOrderTab(event){event.stopPropagation();event.currentTarget.closest('.nav-tab').style.display='none'}
    function closeOtherTabs(){closeTabContext();document.querySelectorAll('.nav-tab[data-page]:not(.active)').forEach(tab=>tab.style.display='none')}
    function closeAllTabs(){closeTabContext();goOrderList()}
    function goOrderList(){window.location.href='./订单兑换列表.html'}
    function goActivityDetail(id){window.location.href=`./订单兑换新增.html?mode=detail&id=${id}`}
    function goUserDetail(id){showToast(`进入用户详情：${id}`)}
    document.addEventListener('click',event=>{if(!event.target.closest('#tabContextMenu'))closeTabContext()});
    const workbenchTabsKey='yo_order_exchange_open_tabs_v2';
    const workbenchTabDefs={'order-exchange':{label:'订单兑换',url:'./订单兑换列表.html'},'exchange-data':{label:'兑换数据',url:'./兑换数据.html'},'exchange-audit':{label:'兑换审核',url:'./兑换审核.html'},'public-stores':{label:'公域店铺',url:'./公域店铺列表.html'},'order-limit':{label:'订单限制',url:'./订单限制.html'},'store-form':{label:'店铺新建',url:'./公域店铺新增.html'},'order-form':{label:'订单兑换新增',url:'./订单兑换新增.html'},'activity-store':{label:'活动店铺',url:'./活动店铺.html'}};
    let currentWorkbenchTab='exchange-audit';
    function getWorkbenchTabs(){try{return JSON.parse(localStorage.getItem(workbenchTabsKey)||'[]')}catch(e){return []}}
    function saveWorkbenchTabs(tabs){localStorage.setItem(workbenchTabsKey,JSON.stringify(tabs))}
    function initWorkbenchTabs(current,label){currentWorkbenchTab=current;const tabs=getWorkbenchTabs().filter(id=>workbenchTabDefs[id]);if(!tabs.includes(current))tabs.push(current);if(label&&workbenchTabDefs[current])workbenchTabDefs[current].label=label;saveWorkbenchTabs(tabs);renderWorkbenchTabs()}
    function renderWorkbenchTabs(){const box=document.querySelector('.nav-tabs');if(!box)return;const tabs=getWorkbenchTabs().filter(id=>workbenchTabDefs[id]);box.innerHTML=`<div class="nav-tab fixed">首页</div>`+tabs.map(id=>`<div class="nav-tab ${id===currentWorkbenchTab?'active':''}" data-page="${id}" onclick="goWorkbenchTab('${id}')" oncontextmenu="openTabContext(event,'${id}')">${workbenchTabDefs[id].label} <span class="tab-close" onclick="closeTab(event,'${id}')">×</span></div>`).join('')}
    function goWorkbenchTab(id){const def=workbenchTabDefs[id];if(def)window.location.href=def.url}
    function closeTab(event,page){if(event)event.stopPropagation();let tabs=getWorkbenchTabs().filter(id=>id!==page);saveWorkbenchTabs(tabs);if(page===currentWorkbenchTab){const next=tabs[tabs.length-1]||'order-exchange';goWorkbenchTab(next)}else renderWorkbenchTabs()}
    function closeCurrentTab(event){if(event)event.stopPropagation();closeTabContext();closeTab(null,document.getElementById('tabContextMenu').dataset.page||currentWorkbenchTab)}
    function closeOtherTabs(){closeTabContext();saveWorkbenchTabs([currentWorkbenchTab]);renderWorkbenchTabs()}
    function closeAllTabs(){closeTabContext();saveWorkbenchTabs(['order-exchange']);goOrderList()}
    renderAudits();
    initWorkbenchTabs('exchange-audit','兑换审核');
  </script>

<script>
(function(){
  const LOGIC_MD_FILE = './PC逻辑.md';
  const LOGIC_CACHE_KEY = 'logic-md-cache:' + LOGIC_MD_FILE;
  function escapeHtml(text){return String(text).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
  function inlineMd(text){return escapeHtml(text).replace(/`([^`]+)`/g,'<code>$1</code>').replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>')}
  function markdownToHtml(md){
    return String(md||'').replace(/\r\n/g,'\n').split('\n').map(function(raw){
      const line=raw.replace(/\s+$/,'');
      if(!line.trim()) return '';
      if(/^---+$/.test(line.trim())) return '<hr>';
      const h=line.match(/^(#{1,6})\s+(.*)$/);
      if(h){const lvl=Math.min(h[1].length,4);return '<h'+lvl+'>'+inlineMd(h[2])+'</h'+lvl+'>'}
      const quote=line.match(/^>\s?(.*)$/);
      if(quote) return '<blockquote>'+inlineMd(quote[1])+'</blockquote>';
      const item=line.match(/^(\s*)([-*]|\d+(?:\.\d+)*\.)\s+(.*)$/);
      if(item){const indent=Math.floor(item[1].replace(/\t/g,'    ').length/2)*18;return '<p class="prd-line" style="padding-left:'+indent+'px"><span class="prd-marker">'+escapeHtml(item[2])+'</span> '+inlineMd(item[3])+'</p>'}
      return '<p>'+inlineMd(line.trim())+'</p>';
    }).join('\n');
  }
  function renderLogic(md, source){const box=document.getElementById('logicContent');if(!box)return;box.innerHTML=markdownToHtml(md);if(source)box.insertAdjacentHTML('afterbegin','<blockquote>当前逻辑读取来源：'+escapeHtml(source)+'</blockquote>')}
  function setLogicPickerVisible(visible){document.querySelectorAll('.logic-file-picker').forEach(function(node){node.style.display=visible?'inline-flex':'none'})}
  function showLogicError(err){const box=document.getElementById('logicContent');if(!box)return;setLogicPickerVisible(true);const cached=localStorage.getItem(LOGIC_CACHE_KEY);if(cached){renderLogic(cached,'本地缓存（同目录 Markdown 自动读取失败，请点击「选择文件」兜底更新）');box.insertAdjacentHTML('afterbegin','<div class="logic-load-error">同目录在线逻辑读取失败，已临时展示缓存内容。请确认 '+escapeHtml(LOGIC_MD_FILE)+' 与 HTML 位于同一目录，或点击右上角「选择文件」。<br>错误信息：'+escapeHtml(err&&err.message?err.message:err)+'</div>');return}box.innerHTML='<div class="logic-load-error">未能读取同目录逻辑文件 '+escapeHtml(LOGIC_MD_FILE)+'。请确认 md 与 HTML 位于同一目录，并通过 GitHub Pages / 本地 http 服务打开；如果当前是 file:// 直接打开，浏览器可能会拦截读取。可点击右上角「选择文件」手动载入。<br>错误信息：'+escapeHtml(err&&err.message?err.message:err)+'</div>'}
  window.refreshLogicMarkdown=function(force){if(force)localStorage.removeItem(LOGIC_CACHE_KEY);setLogicPickerVisible(false);const box=document.getElementById('logicContent');if(box)box.innerHTML='<p>正在读取同目录逻辑文件 '+escapeHtml(LOGIC_MD_FILE)+'...</p>';const url=LOGIC_MD_FILE+(LOGIC_MD_FILE.indexOf('?')>-1?'&':'?')+'_t='+Date.now();fetch(url,{cache:'no-store'}).then(function(res){if(!res.ok)throw new Error('HTTP '+res.status);return res.text()}).then(function(md){localStorage.setItem(LOGIC_CACHE_KEY,md);setLogicPickerVisible(false);renderLogic(md,LOGIC_MD_FILE)}).catch(function(err){showLogicError(err)})};
  window.handleLogicFileSelect=function(input){const file=input&&input.files&&input.files[0];if(!file)return;const reader=new FileReader();reader.onload=function(){const md=String(reader.result||'');localStorage.setItem(LOGIC_CACHE_KEY,md);renderLogic(md,file.name);setLogicPickerVisible(true);input.value=''};reader.readAsText(file,'utf-8')};
  if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',window.refreshLogicMarkdown);else window.refreshLogicMarkdown();
})();
</script>
</body>
</html>
