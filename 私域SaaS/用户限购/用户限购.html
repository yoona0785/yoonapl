<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>用户限购原型</title>
  <style>

    body{margin:0;font-family:"Helvetica Neue",Helvetica,"PingFang SC","Microsoft YaHei",Arial,sans-serif;color:var(--text-main);font-size:14px;background:var(--bg-page)}

    .workbench{height:100vh;display:flex;background:#fff;overflow:hidden}

    .logic-panel{width:40%;border-right:1px solid var(--border-inner);background:#fff;display:none;flex-direction:column;min-width:520px}

    .logic-head{height:48px;border-bottom:1px solid var(--border-inner);display:flex;align-items:center;justify-content:space-between;padding:0 16px}

    .admin.side-mini .m1{justify-content:center;padding:0}.admin.side-mini .m1-label,.admin.side-mini .arrow,.admin.side-mini .m2-wrap{display:none}

    .content{flex:1;min-width:0;overflow:auto;padding:0 0 18px}

    .source-tag{display:inline-flex;color:#00a6ff;font-size:12px;font-weight:600;margin-top:4px}

    .switch{width:32px;height:18px;border-radius:9px;background:#c9cdd1;display:inline-flex;align-items:center;padding:2px;cursor:pointer;transition:.18s}
    .switch:after{content:"";width:14px;height:14px;border-radius:50%;background:#fff;box-shadow:0 1px 2px rgba(0,0,0,.16);transition:.18s}

    .op.danger{color:#ff0000}
    .more{display:inline-block;color:var(--primary);cursor:pointer;padding:2px 5px}
    .bottom-bar{height:48px;border-top:1px solid var(--border-inner);display:flex;align-items:center;justify-content:space-between;padding:0 0 0 0;margin-top:0}
    .bottom-left,.pager{display:flex;align-items:center;gap:10px;color:#666;font-size:13px}
    .page-num{min-width:28px;height:28px;border-radius:4px;display:inline-flex;align-items:center;justify-content:center}.page-num.active{background:var(--primary);color:#fff}
    .empty{height:220px;display:flex;align-items:center;justify-content:center;color:#aaa;flex-direction:column;border-bottom:1px solid #f2f2f2}
    .empty-box{width:44px;height:32px;border:1px solid #ddd;border-radius:4px;margin-bottom:10px;position:relative}.empty-box:before{content:"";position:absolute;top:-8px;left:10px;width:22px;height:10px;border:1px solid #ddd;border-bottom:0;border-radius:6px 6px 0 0;background:#fff}
    .checkbox{width:16px;height:16px;border:1px solid #c9d0e0;border-radius:3px;display:inline-flex;align-items:center;justify-content:center;background:#fff;cursor:pointer;vertical-align:middle}

    .checkbox.checked:after{content:"";width:8px;height:4px;border-left:2px solid #fff;border-bottom:2px solid #fff;transform:rotate(-45deg);margin-top:-2px}
    .checkbox.indeterminate:after{content:"";width:8px;height:2px;background:#fff}
    .form-page{background:#fff;min-height:calc(100vh - 48px)}
    .form-top{height:54px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border-inner);padding:0 26px}
    .back{color:#333;cursor:pointer}.back:before{content:"‹";font-size:24px;vertical-align:-2px;margin-right:6px;color:#333}
    .form-layout{display:grid;grid-template-columns:minmax(0,1fr) 116px;gap:16px;padding:24px 26px 40px}
    .form-main{min-width:0}
    .section{scroll-margin-top:16px;margin-bottom:30px}
    .sec-title{font-size:15px;color:var(--text-title);font-weight:600;border-left:3px solid var(--primary);padding-left:10px;margin-bottom:14px}
    .card{border:1px solid var(--border-inner);border-radius:6px;background:#fff;padding:20px 24px}
    .form-row{display:grid;grid-template-columns:120px minmax(0,1fr);gap:12px;align-items:flex-start;margin-bottom:16px;min-height:36px}
    .form-row:last-child{margin-bottom:0}
    .label{height:36px;line-height:36px;color:#666}.label.req:after{content:" *";color:#ff0000}
    .control .input,.control .select{width:500px;height:36px}
    textarea.input{height:auto;min-height:96px;padding-top:8px;resize:vertical}
    .seg{display:inline-flex;border-radius:4px}
    .seg button{width:125px;height:36px;border:1px solid var(--border);background:#fff;color:var(--text-main);cursor:pointer}
    .seg button+button{border-left:0}.seg button.active{background:var(--primary-light);border-color:var(--primary);color:var(--primary);position:relative;z-index:1}
    .radio-row{height:36px;display:flex;align-items:center;gap:24px;flex-wrap:wrap}
    .radio{display:inline-flex;align-items:center;gap:7px;cursor:pointer;color:#515a6e}
    .dot{width:14px;height:14px;border:1px solid #c9d0e0;border-radius:50%;display:inline-block;position:relative}
    .radio.active .dot{border-color:var(--primary)}.radio.active .dot:after{content:"";position:absolute;width:8px;height:8px;background:var(--primary);border-radius:50%;left:2px;top:2px}
    .helper{font-size:12px;color:#999;margin-top:6px}
    .selected-box{width:500px;min-height:36px;border:1px solid var(--border);border-radius:4px;padding:6px 8px;display:flex;gap:6px;flex-wrap:wrap;align-items:center}
    .product-list{width:330px}
    .product-list-title{font-size:13px;color:#666;margin-bottom:10px}
    .product-card{height:58px;border:1px solid var(--border-inner);border-radius:4px;margin-bottom:8px;display:grid;grid-template-columns:18px 42px minmax(0,1fr) 54px;align-items:center;gap:8px;padding:8px;background:#fff}
    .drag-dot{color:#bbb;font-size:18px;line-height:1}
    .product-img{width:38px;height:38px;border-radius:3px;border:1px solid #f0f0f0;background:linear-gradient(135deg,#fff4f4,#dff0ff);display:flex;align-items:center;justify-content:center;color:#051D86;font-size:12px}
    .product-info{min-width:0}.product-name{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:#333;font-size:13px}.product-price{color:#ff4100;font-size:12px;margin-top:4px}
    .product-ops{display:flex;gap:8px;align-items:center;justify-content:flex-end;color:#666}.product-ops button{border:0;background:transparent;color:#666;cursor:pointer;padding:0;font-size:16px}
    .add-product{width:330px;height:30px;border:1px dashed var(--border);background:#fff;border-radius:4px;color:#515a6e;cursor:pointer}
    .multi-select{position:relative;width:500px}
    .multi-display{min-height:36px;border:1px solid var(--border);border-radius:4px;padding:4px 28px 4px 6px;display:flex;align-items:center;gap:6px;flex-wrap:wrap;cursor:pointer;background:#fff}
    .multi-display:after{content:"⌄";position:absolute;right:10px;top:8px;color:#bbb}
    .multi-select.open .multi-display{border-color:var(--primary);box-shadow:0 0 0 2px rgba(5,29,134,.12)}
    .multi-menu{display:none;position:absolute;top:40px;left:0;width:315px;max-height:250px;overflow:auto;background:#fff;border:1px solid var(--border-inner);box-shadow:0 2px 8px rgba(0,0,0,.12);border-radius:4px;z-index:20;padding:8px 0}
    .multi-select.open .multi-menu{display:block}
    .multi-option{height:28px;display:flex;align-items:center;gap:8px;padding:0 12px;cursor:pointer;font-size:13px;color:#515a6e}.multi-option:hover{background:#f9fafc}
    .tree-option{padding-left:12px}.tree-option.child{padding-left:34px}.tree-caret{width:12px;color:#666}.select-placeholder{color:#c5c8ce;font-size:13px}
    .user-input-row{display:flex;align-items:flex-end;gap:14px}
    .user-textarea{width:360px!important;min-height:92px!important}
    .selector-img{width:36px;height:36px;border-radius:3px;border:1px solid #eee;background:linear-gradient(135deg,#fff2f2,#e8f3ff);display:flex;align-items:center;justify-content:center;color:#051D86;font-size:12px}
    .anchor{position:sticky;top:16px;align-self:start;border-left:1px solid #f2f2f2;padding:0 0 0 0}
    .anchor a{display:block;height:32px;line-height:32px;padding-left:14px;color:#666;text-decoration:none;font-size:13px;border-left:2px solid transparent;margin-left:-1px}

    .modal-mask.show{display:flex}

<body>
  <div class="workbench" id="workbench">
    <aside class="logic-collapsed" onclick="toggleLogic(true)"><span>展开逻辑</span></aside>
    <aside class="logic-panel">
      <div class="logic-head">
        <div class="logic-title">用户限购业务逻辑</div>
        <div class="logic-actions">
          <button class="text-btn" onclick="document.getElementById('docInput').click()">同步本地文档</button>

      </div>

  <script>
    const LS_DOC='upl_logic_doc_v4', LS_DOC_NAME='upl_logic_doc_name_v4', LS_DATA='upl_data_v1';
    const defaultLogic = `# 页面路径
用户中心 / 用户管理
用户中心 / 用户限购
内容中心 / 商品评价

# 原型链接
- [打开用户限购及运营原型 HTML](file:///Users/dapiaoliang/Documents/AI%20Design/%E7%A7%81%E5%9F%9FSaaS/2.14%20%E7%94%A8%E6%88%B7%E9%99%90%E8%B4%AD/user-purchase-limit-prototype.html)

# 流程状态

- 用户限购为用户中心下新增菜单，用于管理商品屏蔽规则与商品限购规则。

# 列表逻辑
- 用户管理列表字段：用户ID、用户昵称、用户手机号、性别、生日、当前阶段、来源渠道、邀请渠道、邀请人、注册时间、上次消费时间、三方编码、操作。
- 用户管理支持用户ID/手机号、用户昵称、用户性别、当前阶段筛选，支持导出和导入积分。
- 商品评价列表字段：提交内容、商品信息、订单编号、评分、评价区状态、操作。
- 商品评价提交内容字段展示评价来源标签：首次评价、追加评价、导入评价。
- 商品评价更多搜索支持评价来源下拉筛选：首次评价、追加评价、导入评价。
- 用户限购页面顶部使用 Tab 切换：商品屏蔽、商品限购。
- 商品屏蔽列表字段：规则名称、屏蔽人群、状态、创建时间、更新时间、操作。
- 商品限购列表字段：规则名称、限购人群、状态、创建时间、更新时间、操作。
- 商品屏蔽/商品限购列表均支持按规则名称、状态、创建日期筛选。
- 商品屏蔽/商品限购列表操作为：编辑、日志、删除；状态通过列表开关启停。
- 商品屏蔽/商品限购列表不提供导出和批量操作。

# 表单逻辑
- 新建/编辑从当前 Tab 进入对应表单：商品屏蔽 Tab 进入商品屏蔽表单，商品限购 Tab 进入商品限购表单，表单内不再切换规则类型。
- 新建默认启用，表单不展示规则类型和规则状态。
- 表单字段包含：规则名称、商品范围、商品列表/商品分类、适用人群。
- 手动选择时字段为商品列表，点击选择商品打开商品选择弹窗；已选商品支持上移、下移、删除。
- 商品分类使用下拉多选，选择后或点击空白处收起。
- 指定人群、指定标签使用下拉多选。
- 指定用户使用多行输入框，支持点击查看用户打开用户信息弹窗。
- 商品限购额外配置限购设置：终身限购、按单限购、按周期限购；周期支持每天、每月、指定周期。

# 列表交互
- 新建保存后新增规则并回到对应 Tab。
- 编辑保存后更新当前规则并回到列表。
- 删除确认后从列表移除规则；启用/停用会更新规则状态与更新时间。

    function inlineMd(text){return text.replace(/\[([^\]]+)\]\(([^)]+)\)/g,`<a href="$2" target="_blank" style="color:#051D86;text-decoration:none">$1</a>`)}
    function mdToHtml(md){return md.replace(/[&<>]/g,s=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[s])).split('\n').map(line=>{if(line.startsWith('# '))return `<h1>${inlineMd(line.slice(2))}</h1>`;if(line.startsWith('## '))return `<h2>${inlineMd(line.slice(3))}</h2>`;if(line.startsWith('### '))return `<h3>${inlineMd(line.slice(4))}</h3>`;if(line.startsWith('- '))return `<li>${inlineMd(line.slice(2))}</li>`;if(!line.trim())return '';return `<p>${inlineMd(line)}</p>`}).join('').replace(/(<li>.*?<\/li>)+/gs,m=>`<ul>${m}</ul>`)}

    function downloadReviewTemplate(){const csv='\ufeff头像,昵称,商品ID,评价内容,评价图片,商品评分,物流配送,平台服务,评价区状态\n,导入会员,100136,这个商品很好,,5,5,5,隐藏\n';const blob=new Blob([csv],{type:'text/csv;charset=utf-8'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='导入评价模板.csv';document.body.appendChild(a);a.click();URL.revokeObjectURL(a.href);a.remove();toast('模板已下载','info')}
    function parseReviewFile(file){if(!file)return;const reader=new FileReader();reader.onload=()=>{const text=String(reader.result||'');const lines=text.replace(/^\ufeff/,'').split(/\r?\n/).filter(Boolean);const header=(lines.shift()||'').split(',').map(s=>s.trim());const required=['头像','昵称','商品ID','评价内容','评价图片','商品评分','物流配送','平台服务','评价区状态'];const headerOk=required.every((h,i)=>header[i]===h);const rows=lines.map((line,i)=>{const c=line.split(',').map(s=>s.trim());const scores=[Number(c[5]),Number(c[6]),Number(c[7])];const ok=!!c[1]&&!!c[2]&&!!c[3]&&scores.every(n=>Number.isFinite(n)&&n>=1&&n<=5)&&['隐藏','展示'].includes(c[8]||'隐藏');const product=reviewProductById(c[2]);return {row:i+2,avatar:c[0]||'',nick:c[1]||'',productId:c[2]||'',content:c[3]||'',image:c[4]||'',score:c[5]||'',logistics:c[6]||'',service:c[7]||'',status:c[8]||'隐藏',productName:product?(product.productName||product.name):'-',ok}});state.reviewImportResult={file:file.name,headerOk,rows};renderReviewImportResult()};reader.readAsText(file,'UTF-8')}

    function openPointImport(){state.importResult=null;modalMask.className='modal-mask show';modalMask.innerHTML=`<div class="modal" style="width:680px"><div class="modal-head"><span>导入积分</span><span class="modal-close" onclick="closeModal()">×</span></div><div class="modal-body"><div class="form-row"><div class="label">导入模板</div><div class="control"><button class="btn-default" onclick="downloadPointTemplate()">下载模板</button><div class="helper">模板字段：用户ID、积分数量、变更说明</div></div></div><div class="form-row"><div class="label req">上传文件</div><div class="control"><input id="pointFileInput" type="file" accept=".csv,.txt" style="display:none" onchange="parsePointFile(this.files[0])"><div class="selected-box" id="pointUploadBox" onclick="document.getElementById('pointFileInput').click()" style="height:72px;justify-content:center;color:#999;border-style:dashed;cursor:pointer">点击上传 CSV 文件</div></div></div><div id="pointImportResult"></div></div><div class="modal-foot"><button class="btn-default" onclick="closeModal()">取消</button><button class="btn-primary" onclick="savePointImport()">保存</button></div></div>`}
    function parsePointFile(file){if(!file)return;const reader=new FileReader();reader.onload=()=>{const text=String(reader.result||'');const lines=text.replace(/^\ufeff/,'').split(/\r?\n/).filter(Boolean);const header=(lines.shift()||'').split(',').map(s=>s.trim());const required=['用户ID','积分数量','变更说明'];const headerOk=required.every((h,i)=>header[i]===h);const rows=lines.map((line,i)=>{const cols=line.split(',').map(s=>s.trim());const score=Number(cols[1]);const ok=!!cols[0]&&Number.isFinite(score)&&score!==0&&!!cols[2];return {row:i+2,userId:cols[0]||'',score:cols[1]||'',desc:cols[2]||'',ok,msg:ok?'校验通过':'用户ID、积分数量、变更说明均必填，积分数量需为非0数字'}});state.importResult={file:file.name,headerOk,rows};renderPointImportResult()};reader.readAsText(file,'UTF-8')}
    function renderPointImportResult(){const r=state.importResult;if(!r)return;const success=r.headerOk&&r.rows.length&&r.rows.every(x=>x.ok);const box=document.getElementById('pointUploadBox');if(box)box.textContent=`已选择：${r.file}`;pointImportResult.innerHTML=`<div class="form-row"><div class="label">解析结果</div><div class="control"><div class="tag ${success?'on':'off'}">${success?'可导入':'解析失败'}</div><span class="subline"> 共 ${r.rows.length} 条，成功 ${r.rows.filter(x=>x.ok).length} 条，失败 ${r.rows.filter(x=>!x.ok).length+(r.headerOk?0:1)} 条</span></div></div>${!r.headerOk?'<div class="form-row"><div class="label"></div><div class="control"><div class="tag off">表头需为：用户ID、积分数量、变更说明</div></div></div>':''}<table><thead><tr><th style="width:70px">行号</th><th>用户ID</th><th>积分数量</th><th>变更说明</th><th style="width:110px">结果</th></tr></thead><tbody>${r.rows.map(x=>`<tr><td>${x.row}</td><td>${x.userId}</td><td>${x.score}</td><td>${x.desc}</td><td><span class="tag ${x.ok?'on':'off'}">${x.ok?'成功':'失败'}</span></td></tr>`).join('')}</tbody></table>`}
    function savePointImport(){const r=state.importResult;if(!r)return toast('请先上传并解析文件','error');if(!r.headerOk||!r.rows.length||r.rows.some(x=>!x.ok))return toast('存在解析失败数据，请修正后重新上传','error');toast('导入积分成功','info');closeModal()}
    function downloadPointTemplate(){const csv='\ufeff用户ID,积分数量,变更说明\n136514,100,运营手动导入积分\n';const blob=new Blob([csv],{type:'text/csv;charset=utf-8'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='导入积分模板.csv';document.body.appendChild(a);a.click();URL.revokeObjectURL(a.href);a.remove();toast('模板已下载','info')}
    function closeModal(){modalMask.className='modal-mask';modalMask.innerHTML='';state.selector=null}
    function openForm(id,type){const rec=id?db[type].find(r=>r.id===id):null;state.page='form';state.activeTab=type;state.editing=id;state.form=rec?JSON.parse(JSON.stringify(rec)):{id:'',name:'',productMode:'手动选择',products:[],categories:[],audienceType:type==='block'?'指定人群':'全部',audiences:type==='block'?[]:['全部用户'],limitType:'终身限购',period:'每天',periodDays:7,limitQty:1,status:'启用',created:'',updated:'',logs:[]};render()}
    function renderForm(){const f=state.form, isBlock=state.activeTab==='block';f.type=isBlock?'block':'limit';if(!f.status)f.status='启用';if(f.period==='每x天')f.period='指定周期';content.innerHTML=`<div class="form-page"><div class="form-top"><div class="back" onclick="goList()"> ${state.editing?'编辑':'新建'}${isBlock?'商品屏蔽':'商品限购'}</div><div class="actions"><button class="btn-default" onclick="goList()">取消</button><button class="btn-primary" onclick="saveForm()">保存</button></div></div><div class="form-layout"><div class="form-main"><section class="section" id="base"><div class="sec-title">基本信息</div><div class="card"><div class="form-row"><div class="label req">规则名称</div><div class="control"><input class="input" maxlength="50" placeholder="请输入规则名称" value="${f.name}" oninput="state.form.name=this.value"></div></div></div></section><section class="section" id="goods"><div class="sec-title">${isBlock?'屏蔽':'限购'}商品</div><div class="card"><div class="form-row"><div class="label req">商品范围</div><div class="control"><div class="radio-row"><span class="radio ${f.productMode==='手动选择'?'active':''}" onclick="state.form.productMode='手动选择';renderForm()"><i class="dot"></i>手动选择</span><span class="radio ${f.productMode==='商品分类'?'active':''}" onclick="state.form.productMode='商品分类';renderForm()"><i class="dot"></i>商品分类</span></div></div></div><div class="form-row"><div class="label req">${f.productMode==='手动选择'?'商品列表':'商品分类'}</div><div class="control">${f.productMode==='手动选择'?productListHtml():multiSelectHtml('categories',categoryPool,f.categories,'选择分类',true)}</div></div></div></section><section class="section" id="audience"><div class="sec-title">${isBlock?'屏蔽':'限购'}人群</div><div class="card"><div class="form-row"><div class="label req">适用人群</div><div class="control"><div class="radio-row">${(isBlock?['指定人群','指定标签','指定用户']:['全部','指定人群','指定标签','指定用户']).map(a=>`<span class="radio ${f.audienceType===a?'active':''}" onclick="setAudienceType('${a}')"><i class="dot"></i>${a}</span>`).join('')}</div></div></div>${audienceControlHtml()}</div></section>${isBlock?'':limitSection()}</div><nav class="anchor"><a class="active" href="#base">基本信息</a><a href="#goods">${isBlock?'屏蔽':'限购'}商品</a><a href="#audience">${isBlock?'屏蔽':'限购'}人群</a>${isBlock?'':'<a href="#limit">限购设置</a>'}</nav></div></div>`}
    function selectedTags(arr){return arr&&arr.length?arr.map(x=>`<span class="tag">${x}</span>`).join(''):'<span class="select-placeholder">请选择</span>'}
    function jsq(v){return JSON.stringify(String(v))}
    function getProduct(name){return productPool.find(p=>p.name===name)||{id:'-',name,price:'28.00',category:'-',type:'普通'}}
    function productListHtml(){const arr=state.form.products||[];return `<div class="product-list">${arr.map((name,i)=>{const p=getProduct(name);return `<div class="product-card"><span class="drag-dot">⋮⋮</span><span class="product-img">图</span><div class="product-info"><div class="product-name">${p.name}</div><div class="product-price">￥${p.price}</div></div><div class="product-ops"><button title="上移" onclick="moveProduct(${i},-1)">⌃</button><button title="下移" onclick="moveProduct(${i},1)">⌄</button><button title="删除" onclick="removeProduct(${i})">⌫</button></div></div>`}).join('')}<button class="add-product" onclick="openSelector('products')">＋ 选择商品</button></div>`}
    function moveProduct(i,step){const arr=state.form.products;const j=i+step;if(j<0||j>=arr.length)return;[arr[i],arr[j]]=[arr[j],arr[i]];renderForm()}
    function removeProduct(i){state.form.products.splice(i,1);renderForm()}
    function multiSelectHtml(kind,pool,selected,placeholder,isTree){const open=state.openSelect===kind;const opts=pool.map((x,i)=>`<div class="multi-option ${isTree&&i>0&&i<5?'tree-option child':'tree-option'}" onclick="event.stopPropagation();toggleMulti('${kind}','${x}')"><span class="tree-caret">${isTree?(i===0||i===5?'▾':'›'):''}</span><span class="checkbox ${(selected||[]).includes(x)?'checked':''}"></span><span>${x}</span></div>`).join('');return `<div class="multi-select ${open?'open':''}" onclick="event.stopPropagation();toggleMultiOpen('${kind}')"><div class="multi-display">${selectedTags(selected)}</div><div class="multi-menu" onclick="event.stopPropagation()">${opts}</div></div>`}
    function toggleMultiOpen(kind){state.openSelect=state.openSelect===kind?null:kind;renderForm()}
    function toggleMulti(kind,value){const target=kind==='categories'?state.form.categories:state.form.audiences;if(target.includes(value))target.splice(target.indexOf(value),1);else target.push(value);state.openSelect=null;renderForm()}
    function audienceControlHtml(){const f=state.form;if(f.audienceType==='全部')return '';if(f.audienceType==='指定用户')return `<div class="form-row"><div class="label req">指定用户</div><div class="control"><div class="user-input-row"><textarea class="input user-textarea" placeholder="请输入用户ID，英文逗号、换行或空格分隔" oninput="state.form.audiences=this.value.split(/[\\s,，]+/).filter(Boolean)">${(f.audiences||[]).join('\n')}</textarea><button class="text-btn" onclick="viewUsers()">查看用户</button></div></div></div>`;const pool=audiencePool[f.audienceType]||[];return `<div class="form-row"><div class="label req">${f.audienceType}</div><div class="control">${multiSelectHtml('audiences',pool,f.audiences,`选择${f.audienceType.replace('指定','')}`,false)}</div></div>`}
    function viewUsers(){const users=(state.form.audiences||[]).filter(Boolean);modalMask.className='modal-mask show';modalMask.innerHTML=`<div class="modal lg"><div class="modal-head"><span>查看用户信息</span><span class="modal-close" onclick="closeModal()">×</span></div><div class="modal-body"><table><thead><tr><th>用户ID</th><th>用户昵称</th><th>手机号</th><th>性别</th><th>注册时间</th></tr></thead><tbody>${users.length?users.map((u,i)=>`<tr><td>${u}</td><td>私域用户${i+1}</td><td>138****${String(9000+i).slice(-4)}</td><td>${i%2?'女':'男'}</td><td>2026-06-${String(10+i).padStart(2,'0')} 10:24:16</td></tr>`).join(''):`<tr><td colspan="5"><div class="empty"><div class="empty-box"></div><div>暂无数据</div></div></td></tr>`}</tbody></table></div></div>`}
    function setAudienceType(t){state.form.audienceType=t;state.form.audiences=t==='全部'?['全部用户']:[];renderForm()}
    function limitSection(){const f=state.form;return `<section class="section" id="limit"><div class="sec-title">限购设置</div><div class="card"><div class="form-row"><div class="label req">限购方式</div><div class="control"><div class="radio-row">${['终身限购','按单限购','按周期限购'].map(t=>`<span class="radio ${f.limitType===t?'active':''}" onclick="state.form.limitType='${t}';renderForm()"><i class="dot"></i>${t}</span>`).join('')}</div></div></div><div class="form-row"><div class="label req">限购数量</div><div class="control"><div class="limit-combo">${f.limitType==='按周期限购'?`<select class="select" onchange="state.form.period=this.value;renderForm()"><option ${f.period==='每天'?'selected':''}>每天</option><option ${f.period==='每月'?'selected':''}>每月</option><option ${f.period==='指定周期'?'selected':''}>指定周期</option></select>${f.period==='指定周期'?`<span>每</span><input type="number" min="1" class="input" value="${f.periodDays}" oninput="state.form.periodDays=this.value"><span>天</span>`:''}`:''}<span>${f.limitType==='终身限购'?'终身':f.limitType==='按单限购'?'每单':'周期内'}</span><span>限购</span><input type="number" min="1" class="input" value="${f.limitQty}" oninput="state.form.limitQty=this.value"><span>件</span></div></div></div></div></section>`}
    function openSelector(kind){state.selector={kind,selected:new Set(state.form.products||[]),pool:productPool};modalMask.className='modal-mask show';modalMask.innerHTML=`<div class="modal"><div class="modal-head"><span>选择商品</span><span class="modal-close" onclick="closeModal()">×</span></div><div class="modal-body"><div class="modal-toolbar"><input class="input" id="selectorKw" style="width:180px" placeholder="搜索商品名称" oninput="renderSelectorList()"><select class="select" id="selectorType" style="width:180px" onchange="renderSelectorList()"><option value="">全部商品类型</option><option>普通</option></select><button class="icon-search" onclick="renderSelectorList()">⌕</button></div><div id="selectorTable"></div></div><div class="modal-foot"><button class="btn-default" onclick="closeModal()">取消</button><button class="btn-primary" onclick="confirmSelector()">确定</button></div></div>`;renderSelectorList()}
    function renderSelectorList(){const kw=(document.getElementById('selectorKw')||{}).value||'';const type=(document.getElementById('selectorType')||{}).value||'';const list=state.selector.pool.filter(p=>(!kw||p.name.includes(kw))&&(!type||p.type===type));const all=list.length&&list.every(p=>state.selector.selected.has(p.name));selectorTable.innerHTML=`<table><thead><tr><th style="width:36px"><span class="checkbox ${all?'checked':state.selector.selected.size?'indeterminate':''}" onclick="toggleSelectorAll()"></span></th><th style="width:70px">ID</th><th style="width:90px">商品图片</th><th>商品名称</th><th style="width:90px">类型</th><th style="width:90px">价格</th><th style="width:170px">分类</th></tr></thead><tbody>${list.map(p=>`<tr><td><span class="checkbox ${state.selector.selected.has(p.name)?'checked':''}" onclick="toggleSelector(${jsq(p.name)})"></span></td><td>${p.id}</td><td><span class="selector-img">图</span></td><td><div class="product-name">${p.name}</div></td><td>${p.type}</td><td>￥${p.price}</td><td>${p.category}</td></tr>`).join('')}</tbody></table><div class="selector-foot"><div>共 56 条&nbsp;&nbsp;‹ <span class="page-num active">1</span> 2 3 4 5 6 ›</div><select class="select" style="width:90px"><option>10条/页</option></select></div>`}
    function toggleSelector(x){state.selector.selected.has(x)?state.selector.selected.delete(x):state.selector.selected.add(x);renderSelectorList()}
    function toggleSelectorAll(){const kw=(document.getElementById('selectorKw')||{}).value||'';const type=(document.getElementById('selectorType')||{}).value||'';const list=state.selector.pool.filter(p=>(!kw||p.name.includes(kw))&&(!type||p.type===type));const all=list.length&&list.every(p=>state.selector.selected.has(p.name));list.forEach(p=>all?state.selector.selected.delete(p.name):state.selector.selected.add(p.name));renderSelectorList()}
    function confirmSelector(){state.form.products=[...state.selector.selected];closeModal();renderForm()}
    function saveForm(){const f=state.form;if(!f.name.trim())return toast('请输入规则名称','error');if(f.productMode==='手动选择'&&!f.products.length)return toast('请选择商品','error');if(f.productMode==='商品分类'&&!f.categories.length)return toast('请选择商品分类','error');if(f.audienceType!=='全部'&&!f.audiences.length)return toast('请选择适用人群','error');if(f.type==='limit'&&(!f.limitQty||Number(f.limitQty)<=0))return toast('请输入正确的限购数量','error');const list=db[f.type];if(state.editing){const idx=list.findIndex(x=>x.id===state.editing);f.updated=now();f.updateUser='运营管理员';f.createUser=f.createUser||'运营管理员';f.logs=(f.logs||[]);f.logs.unshift(log('编辑规则配置'));list[idx]=f}else{f.id=(f.type==='block'?'B':'L')+Date.now();f.created=f.updated=now();f.createUser='运营管理员';f.updateUser='运营管理员';f.logs=[log('新建规则')];list.unshift(f)}saveData();state.activeTab=f.type;toast('保存成功','info');goList(f.type)}
    document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal()});
    document.addEventListener('click',()=>{if(state.page==='form'&&state.openSelect){state.openSelect=null;renderForm()}});
    modalMask.addEventListener('click',e=>{if(e.target===modalMask)closeModal()});
    initLogic();renderMenu();render();
  </script>
</body>
</html>
